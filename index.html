            <div className="modal-header">
              <h2>✏️ Edit Appointment</h2>
              <button className="close-btn" onClick={onClose}>×</button>
            </div>

            <div style={{padding: '1.5rem', maxHeight: '70vh', overflowY: 'auto'}}>
              <div style={{marginBottom: '1rem', padding: '1rem', background: '#f0f9ff', borderRadius: '8px'}}>
                <div style={{fontWeight: '600', color: '#46C5FF'}}>Customer: {appointment.customerName}{appointment.farmName ? ` — ${appointment.farmName}` : ''}</div>
                <div style={{fontSize: '0.875rem', color: '#64748b'}}>Email: {appointment.email || 'Not provided'}</div>
              </div>

              <div className="form-group">
                <label>Farm / Business Name</label>
                <input
                  type="text"
                  value={farmName}
                  onChange={(e) => setFarmName(e.target.value)}
                  placeholder="Sunny Acres Farm (optional)"
                />
              </div>

              <div className="form-group">
                <label>Phone Number *</label>
                <input 
                  type="tel"
                  value={phone}
                  onChange={(e) => setPhone(e.target.value)}
                  placeholder="561-555-0123"
                />
              </div>

              <div style={{display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '1rem'}}>
                <div className="form-group">
                  <label>Date *</label>
                  <input 
                    type="date"
                    value={date}
                    onChange={(e) => setDate(e.target.value)}
                  />
                </div>
                <div className="form-group">
                  <label>Time *</label>
                  <input 
                    type="time"
                    value={time}
                    onChange={(e) => setTime(e.target.value)}
                  />
                </div>
              </div>

              <div className="form-group">
                <label>Number of Horses</label>
                <input 
                  type="number"
                  value={numberOfHorses}
                  onChange={(e) => setNumberOfHorses(e.target.value)}
                  placeholder="4"
                  min="1"
                />
              </div>

              <div className="form-group">
                <label>Services</label>
                <div style={{display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '0.5rem'}}>
                  {availableServices.map(service => (
                    <label key={service} style={{
                      display: 'flex',
                      alignItems: 'center',
                      padding: '0.5rem',
                      border: '1px solid var(--border)',
                      borderRadius: '4px',
                      cursor: 'pointer',
                      background: services.includes(service) ? '#dcfce7' : 'white'
                    }}>
                      <input 
                        type="checkbox"
                        checked={services.includes(service)}
                        onChange={() => handleServiceToggle(service)}
                        style={{marginRight: '0.5rem'}}

                      {service}

                </div>

              <div className="form-group">

                <input

              <div style={{display: 'grid', gridTemplateColumns: '2fr 1fr 1fr', gap: '1rem'}}>

                  />
                </div>
                <div className="form-group">
                  <label>State</label>

                <div className="form-group">
                  <label>ZIP</label>
                  <input 
                    type="text"
                    value={zip}
                    onChange={(e) => setZip(e.target.value)}
                    placeholder="33411"

                  />
                </div>
              </div>

              <div className="form-group">
                <label>Notes / Comments</label>
                <textarea 
                  value={comments}
                  onChange={(e) => setComments(e.target.value)}
                  placeholder="Special instructions, gate codes, specific requests..."
                  rows="4"
                  style={{
                    width: '100%',
                    padding: '0.75rem',
                    border: '2px solid var(--border)',
                    borderRadius: '8px',
                    fontSize: '1rem',
                    fontFamily: 'inherit',
                    resize: 'vertical'
                  }}
                />
              </div>

              {/* SMS Notification checkbox */}
              {userProfile?.smsEnabled && appointment.phone && (
                <div style={{
                  marginTop: '1.25rem',
                  padding: '1rem',
                  borderRadius: '10px',
                  border: `2px solid ${smsAvailable ? '#dcfce7' : '#fee2e2'}`,
                  background: smsAvailable ? '#f0fdf4' : '#fff5f5',
                }}>
                  {smsAvailable ? (
                    <label style={{display: 'flex', alignItems: 'flex-start', gap: '0.75rem', cursor: 'pointer'}}>
                      <input
                        type="checkbox"
                        checked={sendNotification}
                        onChange={e => setSendNotification(e.target.checked)}

                      />
                      <div>

                          📱 Notify customer via SMS
                        </div>
                        <div style={{fontSize: '0.82rem', color: 'var(--text)', marginTop: '0.2rem'}}>
                          Sends a text to {appointment.phone} with the updated date &amp; time.
                        </div>
                      </div>
                    </label>
                  ) : (
                    <div style={{display: 'flex', alignItems: 'center', gap: '0.6rem', color: '#dc2626', fontSize: '0.88rem', fontWeight: 600}}>
                      🚫 SMS notifications unavailable — customer has opted out.
                    </div>
                  )}
                </div>
              )}

              {/* Email notification option */}
              {appointment.email && (
                <div style={{
                  marginTop: '1rem',
                  padding: '1rem',
                  borderRadius: '10px',
                  border: '2px solid #dbeafe',
                  background: '#eff6ff',
                }}>
                  <label style={{display: 'flex', alignItems: 'flex-start', gap: '0.75rem', cursor: 'pointer'}}>
                    <input
                      type="checkbox"
                      checked={sendUpdateEmail}
                      onChange={e => setSendUpdateEmail(e.target.checked)}
                      style={{marginTop: '2px', width: 18, height: 18, cursor: 'pointer', flexShrink: 0}}
                    />
                    <div>
                      <div style={{fontWeight: 600, color: '#1d4ed8', fontSize: '0.95rem'}}>
                        📧 Send update email to customer
                      </div>
                      <div style={{fontSize: '0.82rem', color: 'var(--text)', marginTop: '0.2rem'}}>
                        Sends a confirmation update to {appointment.email} with the new details.

              <div style={{display: 'flex', gap: '1rem', marginTop: '1.25rem'}}>

                  className="btn btn-outline"

                </button>

                  style={{flex: 1}}

                >
                  {saving ? 'Saving...' : (sendNotification && smsAvailable && sendUpdateEmail && appointment.email ? '💾 Save & Send SMS + Email' : sendNotification && smsAvailable ? '💾 Save & Send SMS' : sendUpdateEmail && appointment.email ? '💾 Save & Send Email' : '💾 Save Changes')}
                </button>
              </div>
            </div>

        </div>
      );

    function InvoicesView({ userId, userProfile }) {
      const [invoices, setInvoices] = useState([]);
      const [showCreateModal, setShowCreateModal] = useState(false);
      const [showPaymentModal, setShowPaymentModal] = useState(false);
      const [showManualPaymentModal, setShowManualPaymentModal] = useState(false);
      const [selectedInvoice, setSelectedInvoice] = useState(null);
      const [loading, setLoading] = useState(false);
      const [showCancelModal, setShowCancelModal] = useState(false);
      const [cancelPassword, setCancelPassword] = useState('');
      const [invoiceFilter, setInvoiceFilter] = useState('all'); // all, thisMonth, lastMonth, lastQuarter, ytd, paidOnly, openOnly, cancelledOnly, customRange
      const [customStartDate, setCustomStartDate] = useState('');
      const [customEndDate, setCustomEndDate] = useState('');

      useEffect(() => {
        loadInvoices();
      }, []);

      const loadInvoices = async () => {
        console.log('🔵 Loading invoices for userId:', userId);
        if (db) {
          const snapshot = await db.collection('invoices')
            .where('farrierId', '==', userId)
            .get();
          
          console.log('📋 Found invoices:', snapshot.docs.length);
          
          const invoiceData = snapshot.docs.map(doc => ({
            id: doc.id,
            ...doc.data()
          }));
          
          // Sort in JavaScript instead of Firestore
          invoiceData.sort((a, b) => {
            if (!a.createdAt || !b.createdAt) return 0;
            return b.createdAt.toDate() - a.createdAt.toDate();
          });
          
          console.log('✅ Loaded invoices:', invoiceData);
          setInvoices(invoiceData);
        } else {
          console.error('❌ Database not initialized');
        }
      };

      const handleCancelInvoice = async () => {
        // Generate today's password (MMDDYYYY format)
        const today = new Date();
        const month = String(today.getMonth() + 1).padStart(2, '0');
        const day = String(today.getDate()).padStart(2, '0');
        const year = today.getFullYear();
        const correctPassword = `${month}${day}${year}`;

        if (cancelPassword !== correctPassword) {
          alert(`❌ Incorrect password. Today's password is MMDDYYYY format (e.g., ${correctPassword.slice(0,2)}${correctPassword.slice(2,4)}${correctPassword.slice(4)})`);
          return;
        }

        try {
          if (db && selectedInvoice) {
            await db.collection('invoices').doc(selectedInvoice.id).update({
              status: 'cancelled',
              cancelledAt: firebase.firestore.FieldValue.serverTimestamp(),
              cancelledBy: userId
            });

            alert('✅ Invoice cancelled successfully');
            setShowCancelModal(false);
            setSelectedInvoice(null);
            setCancelPassword('');
            loadInvoices();
          }
        } catch (error) {
          console.error('Error cancelling invoice:', error);
          alert('❌ Error cancelling invoice');
        }
      };

      // Export to Excel
      const exportToExcel = () => {
        const exportData = filteredInvoices.map(invoice => ({
          'Invoice Number': invoice.invoiceNumber || '',
          'Date': invoice.createdAt ? invoice.createdAt.toDate().toLocaleDateString('en-US') : '',
          'Customer': invoice.customerName || '',
          'Status': invoice.status || '',
          'Amount': invoice.total || 0,
          'Paid Date': invoice.paidAt ? invoice.paidAt.toDate().toLocaleDateString('en-US') : '',
          'Payment Method': invoice.cardLast4 ? `${invoice.cardType || 'Card'} ${invoice.cardLast4}` : '',
          'Transaction ID': invoice.transactionId || '',
          'Cancelled Date': invoice.cancelledAt ? invoice.cancelledAt.toDate().toLocaleDateString('en-US') : ''
        }));

        // Create worksheet
        const ws = window.XLSX.utils.json_to_sheet(exportData);

        // Set column widths
        ws['!cols'] = [
          { wch: 20 }, // Invoice Number
          { wch: 12 }, // Date
          { wch: 20 }, // Customer
          { wch: 12 }, // Status
          { wch: 12 }, // Amount
          { wch: 12 }, // Paid Date
          { wch: 20 }, // Payment Method
          { wch: 15 }, // Transaction ID
          { wch: 15 }  // Cancelled Date
        ];

        // Format amounts as currency
        const range = window.XLSX.utils.decode_range(ws['!ref']);
        for (let R = range.s.r + 1; R <= range.e.r; ++R) {
          const cellAddress = window.XLSX.utils.encode_cell({ r: R, c: 4 }); // Column E (Amount)
          if (ws[cellAddress]) {
            ws[cellAddress].z = '$#,##0.00';
          }
        }

        // Create workbook
        const wb = window.XLSX.utils.book_new();
        window.XLSX.utils.book_append_sheet(wb, ws, 'Invoices');

        // Generate filename with filter info
        const filterText = 
          invoiceFilter === 'thisMonth' ? 'This_Month' :
          invoiceFilter === 'lastMonth' ? 'Last_Month' :
          invoiceFilter === 'lastQuarter' ? 'Last_Quarter' :
          invoiceFilter === 'ytd' ? 'YTD' :
          invoiceFilter === 'paidOnly' ? 'Paid_Only' :
          invoiceFilter === 'openOnly' ? 'Open_Only' :
          invoiceFilter === 'cancelledOnly' ? 'Cancelled_Only' :
          invoiceFilter === 'customRange' ? 'Custom_Range' :
          'All_Invoices';
        
        const filename = `Farrier_Invoices_${filterText}_${new Date().toISOString().split('T')[0]}.xlsx`;

        // Download
        window.XLSX.writeFile(wb, filename);
      };

      // Filter invoices based on selected filter
      const getFilteredInvoices = () => {
        const now = new Date();
        const currentYear = now.getFullYear();
        const currentMonth = now.getMonth();

        return invoices.filter(invoice => {
          // Apply status filter first
          if (invoiceFilter === 'paidOnly' && invoice.status !== 'paid') return false;
          if (invoiceFilter === 'openOnly' && invoice.status !== 'outstanding') return false;
          if (invoiceFilter === 'cancelledOnly' && invoice.status !== 'cancelled') return false;

          // Apply date filters
          if (!invoice.createdAt) return true; // Include invoices without dates
          
          const invoiceDate = invoice.createdAt.toDate();
          const invoiceYear = invoiceDate.getFullYear();
          const invoiceMonth = invoiceDate.getMonth();

          switch (invoiceFilter) {
            case 'thisMonth':
              return invoiceYear === currentYear && invoiceMonth === currentMonth;
            
            case 'lastMonth':
              const lastMonth = currentMonth === 0 ? 11 : currentMonth - 1;
              const lastMonthYear = currentMonth === 0 ? currentYear - 1 : currentYear;
              return invoiceYear === lastMonthYear && invoiceMonth === lastMonth;
            
            case 'lastQuarter':
              const currentQuarter = Math.floor(currentMonth / 3);
              const lastQuarter = currentQuarter === 0 ? 3 : currentQuarter - 1;
              const lastQuarterYear = currentQuarter === 0 ? currentYear - 1 : currentYear;
              const invoiceQuarter = Math.floor(invoiceMonth / 3);
              return invoiceYear === lastQuarterYear && invoiceQuarter === lastQuarter;
            
            case 'ytd':
              return invoiceYear === currentYear;
            
            case 'customRange':
              if (!customStartDate || !customEndDate) return true;
              const start = new Date(customStartDate);
              const end = new Date(customEndDate);
              end.setHours(23, 59, 59);
              return invoiceDate >= start && invoiceDate <= end;
            
            default:
              return true;
          }
        });
      };

      const filteredInvoices = getFilteredInvoices();

      const getInvPaidAmount = (inv) => inv.paidAmount || (inv.payments||[]).reduce((s,p)=>s+(p.amount||0),0) || (inv.status==='paid'?(inv.total||0):0);
      const totalCollected = filteredInvoices.reduce((sum, inv) => sum + getInvPaidAmount(inv), 0);

      const totalOutstanding = filteredInvoices
        .filter(inv => inv.status === 'outstanding' || inv.status === 'partial')
        .reduce((sum, inv) => sum + Math.max(0, (inv.total||0) - getInvPaidAmount(inv)), 0);

      const totalCancelled = filteredInvoices
        .filter(inv => inv.status === 'cancelled')
        .reduce((sum, inv) => sum + (inv.total || 0), 0);

      return (
        <div>
          <h1 style={{marginBottom: '1.5rem', fontSize: '2rem', color: 'var(--primary)'}}>Invoices & Payments</h1>
          
          <div className="dashboard-grid">
            <div className="stat-card">
              <div className="stat-label">Total Collected</div>
              <div className="stat-value" style={{color: 'var(--success)'}}>${totalCollected.toFixed(2)}</div>
            </div>
            <div className="stat-card">
              <div className="stat-label">Outstanding</div>
              <div className="stat-value" style={{color: 'var(--warning)'}}>${totalOutstanding.toFixed(2)}</div>
            </div>
            {totalCancelled > 0 && (
              <div className="stat-card">
                <div className="stat-label">Cancelled</div>
                <div className="stat-value" style={{color: '#6b7280'}}>${totalCancelled.toFixed(2)}</div>
              </div>
            )}
          </div>

          <div className="card">
            <div style={{display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '1.5rem'}}>
              <h2 style={{marginBottom: 0}}>Your Invoices</h2>
              <button className="btn btn-primary" onClick={() => setShowCreateModal(true)}>
                + Create Invoice
              </button>
            </div>

            {/* Filter Buttons */}
            <div style={{
              display: 'flex',
              gap: '0.5rem',
              marginBottom: '1.5rem',
              flexWrap: 'wrap',
              paddingBottom: '1rem',
              borderBottom: '1px solid var(--border)'
            }}>
              <button
                onClick={() => setInvoiceFilter('all')}
                className={`btn btn-sm ${invoiceFilter === 'all' ? 'btn-primary' : 'btn-outline'}`}
              >
                All Invoices
              </button>
              <button
                onClick={() => setInvoiceFilter('thisMonth')}
                className={`btn btn-sm ${invoiceFilter === 'thisMonth' ? 'btn-primary' : 'btn-outline'}`}
              >
                This Month
              </button>
              <button
                onClick={() => setInvoiceFilter('lastMonth')}
                className={`btn btn-sm ${invoiceFilter === 'lastMonth' ? 'btn-primary' : 'btn-outline'}`}
              >
                Last Month
              </button>
              <button
                onClick={() => setInvoiceFilter('lastQuarter')}
                className={`btn btn-sm ${invoiceFilter === 'lastQuarter' ? 'btn-primary' : 'btn-outline'}`}
              >
                Last Quarter
              </button>
              <button
                onClick={() => setInvoiceFilter('ytd')}
                className={`btn btn-sm ${invoiceFilter === 'ytd' ? 'btn-primary' : 'btn-outline'}`}
              >
                Year to Date
              </button>
              <button
                onClick={() => setInvoiceFilter('paidOnly')}
                className={`btn btn-sm ${invoiceFilter === 'paidOnly' ? 'btn-primary' : 'btn-outline'}`}
              >
                ✅ Paid Only
              </button>
              <button
                onClick={() => setInvoiceFilter('openOnly')}
                className={`btn btn-sm ${invoiceFilter === 'openOnly' ? 'btn-primary' : 'btn-outline'}`}
              >
                ⏳ Open Only
              </button>
              <button
                onClick={() => setInvoiceFilter('cancelledOnly')}
                className={`btn btn-sm ${invoiceFilter === 'cancelledOnly' ? 'btn-primary' : 'btn-outline'}`}
              >
                🚫 Cancelled Only
              </button>
              <button
                onClick={() => setInvoiceFilter('customRange')}
                className={`btn btn-sm ${invoiceFilter === 'customRange' ? 'btn-primary' : 'btn-outline'}`}
              >
                📅 Custom Range
              </button>
              {filteredInvoices.length > 0 && (
                <button
                  onClick={exportToExcel}
                  className="btn btn-sm"

    function PaymentModal({ invoice, onClose, onPaymentSuccess, userProfile }) {
      const paidSoFar = (invoice.payments || []).reduce((s,p) => s + (p.amount||0), 0);
      const remaining = Math.max(0, (invoice.total || 0) - paidSoFar);
      const [chargeAmount, setChargeAmount] = useState(remaining.toFixed(2));
      const [processing, setProcessing] = useState(false);
      const [error, setError] = useState('');
      const [stripeReady, setStripeReady] = useState(false);
      const cardElementRef = React.useRef(null);
      const stripeRef = React.useRef(null);
      const cardRef = React.useRef(null);

      const publishableKey = userProfile?.stripePublishableKey || '';
      const secretKey = userProfile?.stripeSecretKey || '';
      const hasStripe = publishableKey && secretKey;

      React.useEffect(() => {
        if (!hasStripe || !window.Stripe) return;
        const stripe = window.Stripe(publishableKey);
        stripeRef.current = stripe;
        const elements = stripe.elements();
        const card = elements.create('card', {
          style: {
            base: {
              fontSize: '16px',
              color: '#1a1a2e',
              fontFamily: 'system-ui, sans-serif',
              '::placeholder': { color: '#aab7c4' }
            },
            invalid: { color: '#dc2626' }
          }
        });
        cardRef.current = card;
        card.mount(cardElementRef.current);
        card.on('ready', () => setStripeReady(true));
        return () => card.destroy();
      }, [hasStripe, publishableKey]);

      const handlePayment = async () => {
        if (!hasStripe) return;
        setProcessing(true);
        setError('');
        try {
          const amt = parseFloat(chargeAmount);
          if (!amt || amt <= 0) { setError('Please enter a valid amount.'); setProcessing(false); return; }

          // Create payment method from card element
          const { paymentMethod, error: pmError } = await stripeRef.current.createPaymentMethod({
            type: 'card',
            card: cardRef.current,
            billing_details: {
              name: invoice.customerName || '',
              email: invoice.customerEmail || ''
            }
          });

          if (pmError) { setError(pmError.message); setProcessing(false); return; }

          // Charge via our API using the farrier's secret key
          const res = await fetch('/api/stripe-payment', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              action: 'charge',
              paymentMethodId: paymentMethod.id,
              amount: amt,
              farrierId: invoice.farrierId,
              invoiceId: invoice.id,
              invoiceNumber: invoice.invoiceNumber,
              customerEmail: invoice.customerEmail || '',
              customerName: invoice.customerName || '',
              stripeSecretKey: secretKey
            })
          });

          const result = await res.json();

          if (result.success) {
            if (db) {
              const freshDoc = await db.collection('invoices').doc(invoice.id).get();
              const freshData = freshDoc.exists ? freshDoc.data() : {};
              const existingPayments = freshData.payments || [];
              const newPayment = {
                amount: amt,
                method: 'credit_card',
                memo: result.last4 ? `${result.brand || 'Card'} ending ${result.last4}` : 'Credit card',
                date: new Date().toISOString(),
                transactionId: result.transactionId
              };
              const allPayments = [...existingPayments, newPayment];
              const totalPaid = allPayments.reduce((s,p) => s + (p.amount||0), 0);
              const newStatus = totalPaid >= invoice.total ? 'paid' : 'partial';
              await db.collection('invoices').doc(invoice.id).update({
                status: newStatus,
                payments: allPayments,
                paidAmount: totalPaid,
                balanceDue: Math.max(0, invoice.total - totalPaid),
                paidAt: newStatus === 'paid' ? firebase.firestore.FieldValue.serverTimestamp() : (freshData.paidAt || null),
                transactionId: result.transactionId
              });
            }
            alert('✅ Payment successful!');
            onPaymentSuccess();
          } else {
            setError(result.error || 'Payment failed. Please try again.');
          }
        } catch (err) {
          console.error('Payment error:', err);
          setError('Payment processing failed. Please try again.');
        }
        setProcessing(false);
      };

      return (
        <div className="modal-overlay" onClick={onClose}>
          <div className="modal-content" onClick={(e) => e.stopPropagation()} style={{maxWidth: '500px'}}>
            <h2 style={{marginBottom: '1.5rem'}}>💳 Pay Invoice</h2>

            <div style={{background: 'var(--surface)', padding: '1rem', borderRadius: '8px', marginBottom: '1.5rem'}}>
              <div style={{fontSize: '0.875rem', color: '#666', marginBottom: '0.25rem'}}>
                Invoice #{invoice.invoiceNumber} • {invoice.customerName}
              </div>
              <div style={{fontSize: '0.875rem', color: '#666'}}>
                Total: ${invoice.total?.toFixed(2)}
                {paidSoFar > 0 && <> • Paid: ${paidSoFar.toFixed(2)} • <strong>Balance: ${remaining.toFixed(2)}</strong></>}
              </div>
            </div>

            {!hasStripe ? (
              <div style={{background: '#fff7ed', border: '1px solid #fdba74', borderRadius: '8px', padding: '1rem', textAlign: 'center'}}>
                <div style={{fontSize: '1.5rem', marginBottom: '0.5rem'}}>⚠️</div>
                <strong>Stripe not connected</strong>
                <p style={{fontSize: '0.875rem', color: '#666', marginTop: '0.5rem'}}>
                  Go to <strong>Settings → Stripe Payments</strong> and add your Stripe keys to accept card payments.
                </p>
              </div>
            ) : (
              <>
                <div className="form-group">
                  <label>Amount to Charge *</label>
                  <input
                    type="number"
                    step="0.01"
                    min="0.01"
                    value={chargeAmount}
                    onChange={(e) => setChargeAmount(e.target.value)}
                  />
                </div>

                <div className="form-group">
                  <label>Card Details *</label>
                  <div
                    ref={cardElementRef}
                    style={{
                      border: '1px solid var(--border)',
                      borderRadius: '6px',
                      padding: '12px',
                      background: '#fff',
                      minHeight: '44px'
                    }}
                  />
                  <div style={{fontSize: '0.75rem', color: 'var(--text-muted)', marginTop: '0.25rem'}}>
                    Test: 4242 4242 4242 4242 • any future date • any CVV
                  </div>
                </div>

                {error && (
                  <div className="error-message" style={{marginBottom: '1rem'}}>{error}</div>
                )}

                <div style={{display: 'flex', gap: '0.75rem', marginTop: '1.5rem'}}>
                  <button type="button" onClick={onClose} className="btn btn-outline" disabled={processing} style={{flex: 1}}>
                    Cancel
                  </button>
                  <button
                    type="button"
                    className="btn btn-success"
                    disabled={processing || !stripeReady}
                    onClick={handlePayment}
                    style={{flex: 1}}
                  >
                    {processing ? <span className="spinner"></span> : `Pay $${parseFloat(chargeAmount || 0).toFixed(2)}`}
                  </button>
                </div>

                <div style={{marginTop: '1.5rem', padding: '0.75rem 1rem', background: '#f0f9ff', borderRadius: '8px', fontSize: '0.8rem', color: 'var(--text)'}}>
                  🔒 <strong>Secured by Stripe</strong> — card details never touch our servers
                </div>
              </>
            )}
          </div>
        </div>
      );
    }


    function ManualPaymentModal({ invoice, onClose, onPaymentRecorded }) {
      const paidSoFar = (invoice.payments || []).reduce((s,p) => s + (p.amount||0), 0);
      const remaining = Math.max(0, (invoice.total || 0) - paidSoFar);
      const [amount, setAmount] = useState(remaining.toFixed(2));
      const [method, setMethod] = useState('cash');
      const [memo, setMemo] = useState('');
      const [datePaid, setDatePaid] = useState(new Date().toISOString().split('T')[0]);
      const [processing, setProcessing] = useState(false);
      const [error, setError] = useState('');

      const handleRecord = async (e) => {
        e.preventDefault();
        const amt = parseFloat(amount);
        if (!amt || amt <= 0) { setError('Please enter a valid amount.'); return; }
        setProcessing(true);
        setError('');
        try {
          if (db) {
            // Fetch fresh from Firestore to avoid stale payments array
            const freshDoc = await db.collection('invoices').doc(invoice.id).get();
            const freshData = freshDoc.exists ? freshDoc.data() : {};
            const existingPayments = freshData.payments || [];
            const newPayment = {
              amount: amt,
              method: method,
              memo: memo,
              date: new Date(datePaid).toISOString()
            };
            const allPayments = [...existingPayments, newPayment];
            const totalPaid = allPayments.reduce((s,p) => s + (p.amount||0), 0);
            const newStatus = totalPaid >= invoice.total ? 'paid' : 'partial';
            await db.collection('invoices').doc(invoice.id).update({
              status: newStatus,
              payments: allPayments,
              paidAmount: totalPaid,
              balanceDue: Math.max(0, invoice.total - totalPaid),
              paidAt: newStatus === 'paid' ? firebase.firestore.FieldValue.serverTimestamp() : (freshData.paidAt || null)
            });
            onPaymentRecorded();
          }
        } catch (err) {
          console.error('Error recording payment:', err);
          setError('Failed to record payment. Please try again.');
        }
        setProcessing(false);
      };

      const methodLabels = { cash: '💵 Cash', check: '📝 Check', other: '🔄 Other' };

      return (
        <div className="modal-overlay" onClick={onClose}>
          <div className="modal-content" onClick={(e) => e.stopPropagation()} style={{maxWidth: '480px'}}>
            <h2 style={{marginBottom: '1.5rem'}}>💵 Record Manual Payment</h2>

            <div style={{background: 'var(--surface)', padding: '1rem', borderRadius: '8px', marginBottom: '1.5rem'}}>
              <div style={{fontSize: '0.875rem', color: '#666', marginBottom: '0.25rem'}}>
                Invoice #{invoice.invoiceNumber} • {invoice.customerName}
              </div>
              <div style={{fontSize: '0.875rem', color: '#666'}}>
                Invoice Total: ${invoice.total?.toFixed(2)}
                {paidSoFar > 0 && <> • Already Paid: ${paidSoFar.toFixed(2)} • <strong>Balance: ${remaining.toFixed(2)}</strong></>}
              </div>
            </div>

            {error && <div className="error-message" style={{marginBottom:'1rem'}}>{error}</div>}

            <form onSubmit={handleRecord}>
              <div className="form-group">
                <label>Amount Received *</label>
                <input
                  type="number"
                  step="0.01"
                  min="0.01"
                  required
                  value={amount}
                  onChange={(e) => setAmount(e.target.value)}
                />
              </div>

              <div className="form-group">
                <label>Payment Method *</label>
                <select value={method} onChange={(e) => setMethod(e.target.value)}>
                  <option value="cash">💵 Cash</option>
                  <option value="check">📝 Check</option>
                  <option value="other">🔄 Other</option>
                </select>
              </div>

              <div className="form-group">
                <label>Memo / Note (optional)</label>
                <input
                  type="text"
                  value={memo}
                  onChange={(e) => setMemo(e.target.value)}
                  placeholder={method === 'check' ? 'e.g. Check #1042' : 'Optional note'}
                />
              </div>

              <div className="form-group">
                <label>Date Paid *</label>
                <input
                  type="date"
                  required
                  value={datePaid}
                  onChange={(e) => setDatePaid(e.target.value)}
                />
              </div>

              <div style={{display:'flex', gap:'0.75rem', marginTop:'1.5rem'}}>
                <button type="button" onClick={onClose} className="btn btn-outline" disabled={processing} style={{flex:1}}>
                  Cancel
                </button>
                <button type="submit" className="btn" disabled={processing} style={{flex:1, background:'#059669', color:'white'}}>
                  {processing ? <span className="spinner"></span> : `Record $${parseFloat(amount||0).toFixed(2)} Payment`}
                </button>
              </div>
            </form>
          </div>
        </div>
      );
    }

    function InvoiceCreateModal({ userId, userProfile, onClose, onCreated, prefillData }) {

      const [items, setItems] = useState([{ description: '', amount: 0, horseName: '' }]);
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState('');
      const [customers, setCustomers] = useState([]);
      const [loadingCustomers, setLoadingCustomers] = useState(true);
      const [phoneSearching, setPhoneSearching] = useState(false);
      const [selectedCustomerInfo, setSelectedCustomerInfo] = useState(null);

      // Handle prefill data
      useEffect(() => {

      const [zip, setZip] = useState(userProfile?.zip || '');
      const [loading, setLoading] = useState(false);
      const [successMessage, setSuccessMessage] = useState('');
      const [error, setError] = useState('');

      // Stripe settings
      const [stripePublishableKey, setStripePublishableKey] = useState(userProfile?.stripePublishableKey || '');
      const [stripeSecretKey, setStripeSecretKey] = useState(userProfile?.stripeSecretKey || '');
      const [stripeValidating, setStripeValidating] = useState(false);
      const [stripeStatus, setStripeStatus] = useState(userProfile?.stripePublishableKey ? 'connected' : 'none');
      const [stripeAccountName, setStripeAccountName] = useState(userProfile?.stripeAccountName || '');
      
      // Availability settings with defaults
      const defaultAvailability = {
        monday: { enabled: true, start: '09:00', end: '17:00' },
        tuesday: { enabled: true, start: '09:00', end: '17:00' },
        wednesday: { enabled: true, start: '09:00', end: '17:00' },
        thursday: { enabled: true, start: '09:00', end: '17:00' },
        friday: { enabled: true, start: '09:00', end: '17:00' },
        saturday: { enabled: false, start: '09:00', end: '17:00' },
        sunday: { enabled: false, start: '09:00', end: '17:00' }
      };
      
      const [availability, setAvailability] = useState(
        userProfile?.availability || defaultAvailability
      );

      const updateDayAvailability = (day, field, value) => {
        setAvailability({
          ...availability,
          [day]: {
            ...availability[day],
            [field]: value
          }
        });
      };

      const handleSave = async (e) => {
        e.preventDefault();
        setLoading(true);
        setError('');
        setSuccessMessage('');

        try {
          if (db) {
            if (!safeFarrierId) {
              throw new Error('Missing farrier id');
            }
            // Use merge-safe set so we never wipe other fields (ex: Google Calendar tokens)
            await ensureFarriTechfile_(safeFarrierId, {
              businessName: businessName,
              firstName: firstName,
              lastName: lastName,
              phone: phone,
              address: address,
              city: city,
              state: state,
              zip: zip,
              logoUrl: logoUrl,
              autoPrintPdf: autoPrintPdf,
              allowManualPayments: allowManualPayments,
              smsEnabled: smsEnabled,
              availability: availability,
              updatedAt: firebase.firestore.FieldValue.serverTimestamp()
            });

            // Update local state
            setUserProfile(prev => ({
              ...(prev || {}),
              businessName,
              firstName,
              lastName,
              phone,
              address,
              city,
              state,
              zip,
              logoUrl,
              autoPrintPdf,
              allowManualPayments,
              smsEnabled,
              availability
            }));

            setSuccessMessage('Profile updated successfully!');
          }
        } catch (err) {
          console.error('Error updating profile:', err);
          setError('Failed to update profile. Please try again.');
        }

        setLoading(false);
      };

      return (
        <div>
          <h1 style={{marginBottom: '1.5rem', fontSize: '2rem', color: 'var(--primary)'}}>
            Account Settings
          </h1>

          {successMessage && <div className="success-message">{successMessage}</div>}
          {error && <div className="error-message">{error}</div>}

          <div className="card">
            <h2>Business Profile</h2>
            <form onSubmit={handleSave}>
              <div className="form-group">
                <label>Business Name *</label>
                <input 
                  type="text"
                  required
                  value={businessName}
                  onChange={(e) => setBusinessName(e.target.value)}
                  placeholder="John's Farrier Services"
                />
              </div>

              <div style={{display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '0.75rem'}}>
                <div className="form-group">
                  <label>First Name *</label>
                  <input 
                    type="text"
                    required
                    value={firstName}
                    onChange={(e) => setFirstName(e.target.value)}
                    placeholder="John"
                  />
                </div>
                <div className="form-group">
                  <label>Last Name *</label>
                  <input 
                    type="text"
                    required
                    value={lastName}
                    onChange={(e) => setLastName(e.target.value)}
                    placeholder="Smith"
                  />
                </div>
              </div>

              <div className="form-group">
                <label>Email (Cannot be changed)</label>
                <input 
                  type="email"
                  value={userProfile?.email || user.email}
                  disabled
                  style={{background: '#f5f5f5', cursor: 'not-allowed'}}
                />
              </div>

              <div className="form-group">
                <label>Phone Number *</label>
                <input 
                  type="tel"
                  required
                  value={phone}
                  onChange={(e) => setPhone(e.target.value)}
                  placeholder="(555) 555-5555"
                />
              </div>

              <div className="form-group">
                <label>Business Address *</label>
                <input 
                  type="text"
                  required
                  value={address}
                  onChange={(e) => setAddress(e.target.value)}
                  placeholder="123 Main Street"
                />
              </div>

              <div style={{display: 'grid', gridTemplateColumns: '2fr 1fr 1fr', gap: '0.75rem'}}>
                <div className="form-group">
                  <label>City *</label>
                  <input 
                    type="text"
                    required
                    value={city}
                    onChange={(e) => setCity(e.target.value)}
                    placeholder="City"
                  />
                </div>

                <div className="form-group">
                  <label>State *</label>
                  <input 
                    type="text"
                    required
                    value={state}
                    onChange={(e) => setState(e.target.value.toUpperCase())}
                    placeholder="VA"
                    maxLength="2"
                    style={{textTransform: 'uppercase'}}
                  />
                </div>

                <div className="form-group">
                  <label>ZIP *</label>
                  <input 
                    type="text"
                    required
                    value={zip}
                    onChange={(e) => setZip(e.target.value)}
                    placeholder="12345"
                    maxLength="5"
                    pattern="[0-9]{5}"
                  />
                </div>
              </div>

              <div style={{marginTop: '1.5rem', padding: '1rem', background: 'var(--surface)', borderRadius: '8px'}}>
                <div style={{fontWeight: '600', marginBottom: '0.75rem'}}>⚙️ Preferences</div>
                <div style={{display:'flex', alignItems:'center', gap:'10px', marginBottom:'0.75rem'}}>
                  <input type="checkbox" id="autoPrintPdfToggle" checked={Boolean(autoPrintPdf)} onChange={(e)=>setAutoPrintPdf(e.target.checked)} style={{width:'18px',height:'18px'}} />
                  <label htmlFor="autoPrintPdfToggle" style={{cursor:'pointer'}}>Auto-open PDF after creating an invoice</label>
                </div>
                <div style={{display:'flex', alignItems:'center', gap:'10px'}}>
                  <input type="checkbox" id="manualPayToggle" checked={Boolean(allowManualPayments)} onChange={(e)=>setAllowManualPayments(e.target.checked)} style={{width:'18px',height:'18px'}} />
                  <label htmlFor="manualPayToggle" style={{cursor:'pointer'}}>Allow manual payments (Cash / Check) on invoices</label>
                </div>
              </div>

              <button 
                type="submit" 
                className="btn btn-primary"
                disabled={loading}
                style={{marginTop: '1rem'}}
              >
                {loading ? <span className="spinner"></span> : 'Save Changes'}
              </button>
            </form>
          </div>

          {/* Availability Settings */}
          <div className="card" style={{marginTop: '1.5rem'}}>
            <h2>📅 Availability Settings</h2>
            <p style={{color: 'var(--text-muted)', marginBottom: '1.5rem'}}>
              Set your working hours. Customers will only see available times when booking.
            </p>

            <form onSubmit={handleSave}>
              {['monday', 'tuesday', 'wednesday', 'thursday', 'friday', 'saturday', 'sunday'].map(day => (
                <div 
                  key={day}
                  style={{
                    display: 'grid',
                    gridTemplateColumns: '120px 1fr 1fr 1fr',
                    gap: '0.75rem',
                    alignItems: 'center',
                    marginBottom: '1rem',
                    padding: '0.75rem',
                    background: availability[day].enabled ? '#f8f9fa' : '#fff',
                    borderRadius: '4px',
                    border: '1px solid #e0e0e0'
                  }}
                >
                  <label style={{display: 'flex', alignItems: 'center', gap: '0.5rem', margin: 0}}>
                    <input
                      type="checkbox"
                      checked={availability[day].enabled}
                      onChange={(e) => updateDayAvailability(day, 'enabled', e.target.checked)}
                      style={{width: '18px', height: '18px'}}
                    />
                    <span style={{fontWeight: '500', textTransform: 'capitalize'}}>
                      {day}
                    </span>
                  </label>

                  {availability[day].enabled && (
                    <>
                      <div>
                        <label style={{fontSize: '0.875rem', color: '#666', display: 'block', marginBottom: '0.25rem'}}>
                          Start Time
                        </label>
                        <input
                          type="time"
                          value={availability[day].start}
                          onChange={(e) => updateDayAvailability(day, 'start', e.target.value)}
                          required
                          style={{width: '100%'}}
                        />
                      </div>

                      <div>
                        <label style={{fontSize: '0.875rem', color: '#666', display: 'block', marginBottom: '0.25rem'}}>
                          End Time
                        </label>
                        <input
                          type="time"
                          value={availability[day].end}
                          onChange={(e) => updateDayAvailability(day, 'end', e.target.value)}
                          required
                          style={{width: '100%'}}
                        />
                      </div>

                      <div style={{fontSize: '0.875rem', color: '#666', textAlign: 'center'}}>
                        {availability[day].start && availability[day].end && (
                          <>
                            {(() => {
                              const start = new Date(`1970-01-01T${availability[day].start}`);
                              const end = new Date(`1970-01-01T${availability[day].end}`);
                              const hours = (end - start) / (1000 * 60 * 60);
                              return `${hours.toFixed(1)} hours`;
                            })()}
                          </>
                        )}
                      </div>
                    </>
                  )}

                  {!availability[day].enabled && (
                    <div style={{gridColumn: '2 / 5', color: 'var(--text-muted)', fontStyle: 'italic'}}>
                      Not available
                    </div>
                  )}
                </div>
              ))}

              <button 
                type="submit" 
                className="btn btn-primary"
                disabled={loading}
                style={{marginTop: '1rem'}}
              >
                {loading ? <span className="spinner"></span> : 'Save Availability'}
              </button>
            </form>
          </div>

          {/* SMS & Messaging Settings */}
          <div className="card" style={{marginTop: '1.5rem'}}>
            <h2>📱 SMS & Messaging</h2>
            <p style={{color: 'var(--text-muted)', marginBottom: '1.5rem'}}>
              Send automated appointment reminders and invoice notifications to your customers via text message.
              {userProfile?.subscriptionPlan === 'basic' && <><br/><span style={{color:'#d97706', fontWeight:'500'}}>SMS is a $9.95/month add-on for Basic plan subscribers.</span></>}
            </p>

            <div style={{display:'flex', alignItems:'center', gap:'10px', marginBottom:'1rem'}}>
              <input
                type="checkbox"
                id="smsToggle"
                checked={Boolean(smsEnabled)}
                onChange={(e) => setSmsEnabled(e.target.checked)}
                style={{width:'18px', height:'18px'}}
              />
              <label htmlFor="smsToggle" style={{cursor:'pointer', fontWeight:'500'}}>
                Enable SMS notifications for my customers
              </label>
            </div>

            {smsEnabled && (
              <div style={{background:'#f0fdf4', border:'1px solid #bbf7d0', borderRadius:'8px', padding:'1rem', marginBottom:'1rem'}}>
                <div style={{fontWeight:'600', marginBottom:'0.25rem', color:'#166534'}}>✅ SMS Active</div>
                <div style={{fontSize:'0.85rem', color:'#166534'}}>
                  Your clients will receive SMS notifications from the FarriTech shared number <strong>(561) 327-1200</strong>.
                </div>
              </div>
            )}

            {smsEnabled && (
              <div style={{fontSize:'0.85rem', color:'var(--text-muted)', marginTop:'0.5rem'}}>
                <strong>What gets sent automatically:</strong>
                <ul style={{marginTop:'0.5rem', paddingLeft:'1.25rem'}}>
                  <li>Appointment confirmation when you confirm an appointment</li>
                  <li>Invoice notification with payment link when you create an invoice</li>
                  <li>Reminders via the 📱 Send Reminder button on appointments</li>
                </ul>
                Customers can reply <strong>CONFIRM</strong> to confirm appointments or <strong>STOP</strong> to opt out.
              </div>
            )}

            <div style={{marginTop:'1rem'}}>
              <button className="btn btn-primary" onClick={async () => {
                try {
                  await ensureFarriTechfile_(safeFarrierId, { smsEnabled });
                  setUserProfile(prev => ({ ...prev, smsEnabled }));
                  alert(smsEnabled ? '✅ SMS enabled!' : '✅ SMS disabled.');
                } catch(e) { alert('Failed to save SMS settings.'); }
              }}>
                Save SMS Settings
              </button>
            </div>
          </div>

          {/* Stripe Payments Settings */}
          <div className="card" style={{marginTop: '1.5rem'}}>
            <h2>💳 Stripe Payments</h2>
            <p style={{color: 'var(--text-muted)', marginBottom: '1rem', fontSize: '0.9rem'}}>
              Connect your Stripe account to accept credit card payments on invoices. Your keys are stored securely and never shared.
            </p>

            {stripeStatus === 'connected' && (
              <div style={{background: '#f0fdf4', border: '1px solid #86efac', borderRadius: '8px', padding: '0.75rem 1rem', marginBottom: '1rem', display: 'flex', alignItems: 'center', gap: '0.5rem'}}>
                <span style={{fontSize: '1.1rem'}}>✅</span>
                <span style={{color: '#16a34a', fontWeight: 600}}>Stripe connected{stripeAccountName ? ` — ${stripeAccountName}` : ''}</span>
              </div>
            )}

            {stripeStatus === 'error' && (
              <div style={{background: '#fef2f2', border: '1px solid #fca5a5', borderRadius: '8px', padding: '0.75rem 1rem', marginBottom: '1rem'}}>
                <span style={{color: '#dc2626'}}>❌ Invalid keys — please check and try again.</span>
              </div>
            )}

            <div className="form-group">
              <label>Publishable Key <span style={{color:'var(--text-muted)', fontWeight:400}}>(starts with pk_)</span></label>
              <input
                type="text"
                value={stripePublishableKey}
                onChange={(e) => { setStripePublishableKey(e.target.value); setStripeStatus('none'); }}
                placeholder="pk_live_..."
                style={{fontFamily: 'monospace', fontSize: '0.85rem'}}
              />
            </div>

            <div className="form-group">
              <label>Secret Key <span style={{color:'var(--text-muted)', fontWeight:400}}>(starts with sk_)</span></label>
              <input
                type="password"
                value={stripeSecretKey}
                onChange={(e) => { setStripeSecretKey(e.target.value); setStripeStatus('none'); }}
                placeholder="sk_live_..."
                style={{fontFamily: 'monospace', fontSize: '0.85rem'}}
              />
              <div style={{fontSize: '0.75rem', color: 'var(--text-muted)', marginTop: '0.25rem'}}>
                Find these at <a href="https://dashboard.stripe.com/apikeys" target="_blank" rel="noreferrer" style={{color:'var(--primary)'}}>dashboard.stripe.com/apikeys</a>
              </div>
            </div>

            <div style={{display: 'flex', gap: '0.75rem', flexWrap: 'wrap'}}>
              <button
                className="btn btn-primary"
                disabled={stripeValidating || !stripePublishableKey || !stripeSecretKey}
                onClick={async () => {
                  if (!stripePublishableKey.startsWith('pk_')) { alert('Publishable key must start with pk_'); return; }
                  if (!stripeSecretKey.startsWith('sk_')) { alert('Secret key must start with sk_'); return; }
                  setStripeValidating(true);
                  try {
                    const res = await fetch('/api/stripe-payment', {
                      method: 'POST',
                      headers: { 'Content-Type': 'application/json' },
                      body: JSON.stringify({ action: 'validate', stripeSecretKey })
                    });
                    const data = await res.json();
                    if (data.success) {
                      // Store the encrypted key returned by the server, not the plaintext
                      const keyToStore = stripeSecretKey;
                      await ensureFarriTechfile_(safeFarrierId, {
                        stripePublishableKey,
                        stripeSecretKey: keyToStore,
                        stripeAccountName: data.accountName || ''
                      });
                      setUserProfile(prev => ({ ...prev, stripePublishableKey, stripeSecretKey: keyToStore, stripeAccountName: data.accountName || '' }));
                      setStripeAccountName(data.accountName || '');
                      setStripeStatus('connected');
                    } else {
                      setStripeStatus('error');
                    }
                  } catch (e) {
                    setStripeStatus('error');
                  }
                  setStripeValidating(false);
                }}
              >
                {stripeValidating ? <span className="spinner"></span> : '✓ Validate & Save'}
              </button>

              {stripeStatus === 'connected' && (
                <button
                  className="btn btn-outline"
                  onClick={async () => {
                    if (!confirm('Remove your Stripe connection?')) return;
                    await ensureFarriTechfile_(safeFarrierId, { stripePublishableKey: '', stripeSecretKey: '', stripeAccountName: '' });
                    setUserProfile(prev => ({ ...prev, stripePublishableKey: '', stripeSecretKey: '', stripeAccountName: '' }));
                    setStripePublishableKey('');
                    setStripeSecretKey('');
                    setStripeAccountName('');
                    setStripeStatus('none');
                  }}
                >
                  Disconnect
                </button>
              )}
            </div>

            <div style={{marginTop: '1rem', padding: '0.75rem', background: 'var(--surface)', borderRadius: '6px', fontSize: '0.8rem', color: 'var(--text-muted)'}}>
              💡 Use <strong>test keys</strong> (pk_test_ / sk_test_) while testing, then switch to live keys when ready to accept real payments.
            </div>
          </div>

          <div className="card" style={{marginTop: '1.5rem'}}>
            <h2>Account Information</h2>
            <p style={{color: 'var(--text-muted)', marginBottom: '1rem'}}>
              <strong>Account Created:</strong> {userProfile?.createdAt?.toDate().toLocaleDateString() || 'N/A'}
            </p>
            <div style={{marginBottom: '1rem'}}>
              <strong>Booking URL:</strong><br/>
              <code style={{background: 'rgba(13,19,32,0.9)', color: '#46C5FF', padding: '0.5rem', borderRadius: '4px', display: 'inline-block', marginTop: '0.5rem', wordBreak: 'break-all', border: '1.5px solid rgba(38,131,251,0.45)'}}>
                {`${window.location.origin}?farrier=${safeFarrierId}`}
              </code>
              <div style={{marginTop: '0.5rem'}}>
                <button 
                  className="btn btn-sm"
                  onClick={() => {
                    const url = `${window.location.origin}?farrier=${safeFarrierId}`;
                    navigator.clipboard.writeText(url);
                    alert('Booking URL copied to clipboard!');
                  }}
                  style={{marginRight: '0.5rem'}}
                >
                  📋 Copy URL
                </button>
                <button 
                  className="btn btn-sm"
                  onClick={async () => {
                    try {
                      if (db) {
                        // Use merge-safe set so we never wipe other fields (ex: Google Calendar tokens)
            await ensureFarriTechfile_(safeFarrierId, { bookingUrl: `${window.location.origin}/?farrier=${safeFarrierId}` });
setUserProfile({
                          ...userProfile,
                          bookingUrl: `${window.location.origin}?farrier=${safeFarrierId}`
                        });
                        alert('Booking URL updated successfully!');
                      }
                    } catch (error) {
                      console.error('Error updating URL:', error);
                      alert('Failed to update URL');
                    }
                  }}
                >
                  🔄 Update URL
                </button>
              </div>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>

</body>
</html>
