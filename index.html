    .time-slots {
      display: grid;

      gap: 0.75rem;
      margin-top: 1rem;
    }

      text-align: center;
      transition: all 0.2s;
      font-weight: 600;
    }

    }

      background: var(--primary);

      border-color: var(--primary);

      const money_ = (n) => {
        const x = Number(n || 0);
        try { return x.toLocaleString(undefined, { style: "currency", currency: "USD" }); }
        catch { return `$${x.toFixed(2)}`; }
      };

      const formatDate_ = (tsOrDate) => {
        try {
          const d = tsOrDate?.toDate ? tsOrDate.toDate() : (tsOrDate instanceof Date ? tsOrDate : new Date(tsOrDate));
          return isNaN(d.getTime()) ? "" : d.toLocaleDateString();
        } catch { return ""; }
      };

      const safeText_ = (s) => String(s ?? "").replace(/\s+/g, " ").trim();

      // Wrap long text to fit PDF width
      const pdfWrapText_ = (doc, text, x, y, maxWidth, lineHeight) => {
        const lines = doc.splitTextToSize(String(text || ""), maxWidth);
        lines.forEach((ln, i) => doc.text(ln, x, y + (i * lineHeight)));
        return y + (lines.length * lineHeight);
      };

      const buildInvoicePayUrl_ = (invoice) => {
        // Prefer paymentUrl if it exists
        if (invoice?.paymentUrl) return String(invoice.paymentUrl);
        return "";
      };

      const qrToDataUrl_ = async (text) => {
        try {
          if (!text) return "";
          if (window.QRCode && typeof window.QRCode.toDataURL === "function") {
            return await window.QRCode.toDataURL(text, { margin: 1, width: 220 });
          }
        } catch (e) {}
        return "";
      };

      async function generateInvoicePdfBlobUrl(invoice, farrierProfile) {
        if (!window.jspdf?.jsPDF) throw new Error("jsPDF not loaded");
        const { jsPDF } = window.jspdf;

        const profile = farrierProfile || {};
        const businessName = safeText_(profile.businessName) || "FarriTech";
        const bizPhone = safeText_(profile.phone);
        const bizEmail = safeText_(profile.email || ""); // optional
        const bizAddr = [safeText_(profile.address), safeText_(profile.city), safeText_(profile.state), safeText_(profile.zip)]
          .filter(Boolean)
          .join(", ");

        const doc = new jsPDF({ unit: "pt", format: "letter" });
        const pageW = doc.internal.pageSize.getWidth();
        const pageH = doc.internal.pageSize.getHeight();

        // Outer border
        const borderMargin = 28; // points
        doc.setDrawColor(0);
        doc.setLineWidth(1);
        doc.rect(borderMargin, borderMargin, pageW - (borderMargin * 2), pageH - (borderMargin * 2));

        // Style
        doc.setFont("helvetica", "normal");

        // Optional logo
        const logoUrl = safeText_(profile.logoUrl);
        let cursorY = 54;

        if (logoUrl) {
          try {
            // Fetch logo as dataURL (works for public URLs with CORS)
            const resp = await fetch(logoUrl, { mode: "cors" });
            const blob = await resp.blob();
            const dataUrl = await new Promise((resolve) => {
              const r = new FileReader();
              r.onload = () => resolve(r.result);
              r.readAsDataURL(blob);
            });

            // Draw logo (fit into 120x50)
            doc.addImage(dataUrl, "PNG", 48, 40, 120, 50);
          } catch (e) {
            // If logo fails, fall back to text
          }
        }

        // Header right: INVOICE
        doc.setFont("helvetica", "bold");
        doc.setFontSize(22);
        doc.text("INVOICE", pageW - 48, 56, { align: "right" });

        doc.setFontSize(10);
        doc.setFont("helvetica", "normal");

        // Business block (left)
        doc.setFont("helvetica", "bold");
        doc.setFontSize(14);
        doc.text(businessName, 48, 108);
        doc.setFont("helvetica", "normal");
        doc.setFontSize(10);

        let bizLine = 126;
        if (bizAddr) { doc.text(bizAddr, 48, bizLine); bizLine += 14; }
        if (bizPhone) { doc.text(`Phone: ${bizPhone}`, 48, bizLine); bizLine += 14; }
        if (bizEmail) { doc.text(`Email: ${bizEmail}`, 48, bizLine); bizLine += 14; }

        // Invoice meta (right)
        const invNo = safeText_(invoice.invoiceNumber || "");
        const invDate = formatDate_(invoice.createdAt) || formatDate_(new Date());
        // Calculate real status from payments
        const _paidSoFar = invoice.paidAmount || (invoice.payments||[]).reduce((s,p)=>s+(p.amount||0),0);
        const _balDue = Math.max(0, (invoice.total||0) - _paidSoFar);
        const invStatus = _balDue <= 0 && _paidSoFar > 0 ? 'paid' : (_paidSoFar > 0 ? 'partial' : safeText_(invoice.status || 'outstanding'));

        doc.setFont("helvetica", "bold");
        doc.text("Invoice #", pageW - 220, 108);
        doc.text("Date", pageW - 220, 126);
        doc.text("Status", pageW - 220, 144);
        doc.setFont("helvetica", "normal");
        doc.text(invNo, pageW - 48, 108, { align: "right" });
        doc.text(invDate, pageW - 48, 126, { align: "right" });
        doc.text(invStatus.toUpperCase(), pageW - 48, 144, { align: "right" });

        // Watermark - only show PAID when fully paid, CANCELLED when cancelled
        if (invStatus === "paid" || invStatus === "cancelled") {
          doc.saveGraphicsState();
          doc.setTextColor(200, 200, 200);
          doc.setFontSize(72);
          doc.setFont("helvetica", "bold");
          doc.text(invStatus.toUpperCase(), pageW / 2, pageH / 2, { align: "center", angle: 30 });
          doc.restoreGraphicsState();
          doc.setTextColor(0, 0, 0);
        }

        // Bill to
        doc.setDrawColor(220);
        doc.setLineWidth(1);
        doc.roundedRect(48, 170, pageW - 96, 78, 10, 10);

        doc.setFont("helvetica", "bold");
        doc.setFontSize(10);
        doc.text("BILL TO", 64, 192);

        doc.setFont("helvetica", "normal");
        doc.setFontSize(11);
        const custName = safeText_(invoice.customerName || "");
        const custFarmName = safeText_(invoice.customerFarmName || "");
        const custEmail = safeText_(invoice.customerEmail || "");
        const custPhone = safeText_(invoice.customerPhone || "");

        doc.text(custName, 64, 212);
        let custY = 228;
        if (custFarmName) { doc.setFont("helvetica", "italic"); doc.text(custFarmName, 64, custY); doc.setFont("helvetica", "normal"); custY += 14; }
        if (custEmail) { doc.text(custEmail, 64, custY); custY += 14; }
        if (custPhone) { doc.text(custPhone, 64, custY); custY += 14; }

        // Payment QR (if paymentUrl exists)
        const payUrl = buildInvoicePayUrl_(invoice);
        if (payUrl) {
          try {
            const qr = await qrToDataUrl_(payUrl);
            if (qr) {
              doc.setFont("helvetica", "bold");
              doc.setFontSize(9);
              doc.text("PAY ONLINE", pageW - 150, 192, { align: "center" });
              doc.addImage(qr, "PNG", pageW - 190, 200, 80, 80);

        doc.setFontSize(10);
        doc.text("DESCRIPTION", 48, y);
        doc.text("QTY", pageW - 220, y, { align: "right" });
        doc.text("RATE", pageW - 140, y, { align: "right" });
        doc.text("AMOUNT", pageW - 48, y, { align: "right" });
        y += 10;
        doc.setDrawColor(200);
        doc.line(48, y, pageW - 48, y);
        y += 18;

        doc.setFont("helvetica", "normal");
        doc.setFontSize(10);

        const maxDescW = pageW - 48 - 240; // leave room for qty/rate/amount
        const lineH = 14;

        const computeTotal = () => items.reduce((sum, it) => {
          const qty = Number(it.qty || 1);

          const desc = rawDesc === 'Custom Service (enter manually)' ? 'Custom Service' : rawDesc;
          const horse = safeText_(it.horseName || "");
          const qty = Number(it.qty || 1);
          const rate = Number(it.amount ?? it.unitPriceSnapshot ?? 0);
          const lineTotal = qty * rate;

          // Page break

            doc.addPage();

            yAfter = pdfWrapText_(doc, `Horse/Comment: ${horse}`, 48, yAfter, maxDescW, lineH);
            doc.setTextColor(0);

// Ensures the farrier profile doc exists and surfaces permission/config errors clearly
async function ensureFarriTechfile_(uid, profile) {
  if (!db || !uid) throw new Error("Firestore is not initialized.");
  const ref = db.collection("farriers").doc(uid);
  const now = firebase.firestore.FieldValue.serverTimestamp();
  try {
    await ref.set({
      ownerUid: uid,
      farrierId: uid,
      bookingUrl: window.location.origin + "/?farrier=" + uid,
      googleCalendarConnected: false,
      autoPrintPdf: true,
      logoUrl: "",
      ...profile,
      updatedAt: now,
    }, { merge: true });
    const snap = await ref.get();
    if (!snap.exists) {
      throw new Error("Farrier profile was not created. This is usually a Firestore Rules/Permissions issue.");
    }
    return snap.data();
  } catch (e) {
    const code = e?.code || "";
    if (code === "permission-denied") {
      throw new Error("Firestore permission denied while creating your profile. Check Firestore Rules for collection 'farriers'.");
    }
    throw e;
  }
}

        setPhone(prev => prev || (d.phone || ""));

        setLoading(false);

      await new Promise((resolve, reject) => {

        const unsub = auth.onAuthStateChanged((u) => {

            clearTimeout(timeout);
            unsub();
            resolve(u);

        });

// Use the authenticated UID from the live session

console.log("✅ Writing farrier doc, UID:", uid, "farrierId:", farrierDoc?.farrierId);

   function SupportPortal({ user }) {
  const [q, setQ] = useState('');
  const [farriers, setFarriers] = useState([]);
  const [loading, setLoading] = useState(true);
  const [reason, setReason] = useState('Troubleshooting');

  useEffect(() => {
    (async () => {
      if (!db) return;
      const snap = await db.collection('farriers').get();
      setFarriers(snap.docs.map(d => ({ id: d.id, ...d.data() })));
      setLoading(false);
    })();
  }, []);

  const filtered = farriers.filter(f => {
    const s = (q || '').toLowerCase();
    return (
      (f.businessName || '').toLowerCase().includes(s) ||
      (f.email || '').toLowerCase().includes(s) ||
      (f.phone || '').toLowerCase().includes(s)
    );
  });

  const startSession = async (targetFarrierId) => {
    const expires = new Date(Date.now() + 30 * 60 * 1000); // 30 minutes

    const docRef = await db.collection('supportSessions').add({
      supportAgentUid: user.uid,
      targetFarrierId,
      reason,
      createdAt: firebase.firestore.FieldValue.serverTimestamp(),
      expiresAt: firebase.firestore.Timestamp.fromDate(expires),
      endedAt: null
    });

    // Redirect into the normal app in support mode
    const u = new URL(window.location.href);
    u.searchParams.delete('support');
    u.searchParams.set('supportSession', docRef.id);
    window.location.href = u.toString();
  };

  return (
    <div className="app-container">
      <header className="app-header">
        <div className="header-content">
          <div className="logo">
            <span className="logo-icon">🐴</span>
            <span>Support Portal</span>
          </div>
        </div>
      </header>

      <div className="auth-container">
        <div className="card">
          <h2>Impersonate a Farrier</h2>

          <div className="form-group">
            <label>Search</label>
            <input value={q} onChange={(e)=>setQ(e.target.value)} placeholder="business, email, phone..." />
          </div>

          <div className="form-group">
            <label>Reason (required)</label>
            <input value={reason} onChange={(e)=>setReason(e.target.value)} />
          </div>

          {loading ? (
            <p>Loading…</p>
          ) : (
            <div style={{marginTop:'12px'}}>
              {filtered.map(f => (
                <div key={f.id} className="card" style={{marginBottom:'10px'}}>
                  <div><strong>{f.businessName || '(no business name)'}</strong></div>
                  <div style={{color:'var(--text-muted)'}}>{f.email || ''} {f.phone ? `• ${f.phone}` : ''}</div>
                  <div style={{marginTop:'8px'}}>
                    <button className="btn btn-primary" onClick={()=>startSession(f.id)}>
                      Login as this Farrier
                    </button>
                  </div>
                </div>
              ))}
              {filtered.length === 0 && <p style={{color:'var(--text-muted)'}}>No matches.</p>}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

    function CustomerBookingView({ farrierId }) {
      const [step, setStep] = useState('landing');
      const [farrierInfo, setFarrierInfo] = useState(null);
      const [loading, setLoading] = useState(true);
      const [isMobile, setIsMobile] = useState(() => typeof window !== 'undefined' && window.innerWidth < 768);
      const [bookedSlots, setBookedSlots] = useState([]);
      const [loadingSlots, setLoadingSlots] = useState(false);
      const [formData, setFormData] = useState({
        name: '',
        farmName: '',
        phone: '',
        email: '',
        services: [], // Multiple services
        numberOfHorses: '',
        address: '',
        city: '',
        state: '',
        zip: '',
        comments: '',
        date: '',
        time: '',
        smsConsent: false
      });


      // ---- Address Autocomplete (Google Places) ----
      const addressInputRef = useRef(null);
      const [placeMeta, setPlaceMeta] = useState({
        placeId: '',
        formattedAddress: '',
        lat: null,
        lng: null,
        source: '' // 'places' when picked from autocomplete
      });

      useEffect(() => {
        // Use new PlaceAutocompleteElement API (required for keys created after March 1 2025)
        let tries = 0;
        const maxTries = 40;
        const timer = setInterval(() => {
          tries++;
          const container = addressInputRef.current;
          if (window.google?.maps?.places?.PlaceAutocompleteElement && container) {
            clearInterval(timer);
            try {
              const pac = new window.google.maps.places.PlaceAutocompleteElement({
                types: ['address'],
                componentRestrictions: { country: 'us' },
              });

              // Style the widget to match the rest of the form
              pac.style.cssText = 'width:100%;display:block;';

              container.appendChild(pac);
              console.log('✅ Google PlaceAutocompleteElement attached');

              // Try both event names - API version determines which fires
              const handlePlaceSelect = async (e) => {
                try {
                  const prediction = e.placePrediction || e.place;
                  if (!prediction) return;

                  const place = prediction.toPlace ? prediction.toPlace() : prediction;
                  await place.fetchFields({ fields: ['addressComponents', 'formattedAddress', 'location', 'id'] });

                  // Parse formatted address as reliable fallback: "123 Main St, City, ST 12345, USA"
                  const formatted = place.formattedAddress || '';
                  console.log('📍 formattedAddress:', formatted);

                  const comps = place.addressComponents || [];
                  console.log('📍 comps count:', comps.length);

                  let streetNumber = '', route = '', city = '', state = '', zip = '';

                  if (comps.length > 0) {
                    const get = (type, short = false) => {
                      for (const c of comps) {
                        const types = c.types || [];
                        if (types.includes(type)) return short ? (c.shortText || c.short_name || '') : (c.longText || c.long_name || '');
                      }
                      return '';
                    };
                    streetNumber = get('street_number');
                    route = get('route');
                    city = get('locality') || get('sublocality') || get('postal_town');
                    state = get('administrative_area_level_1', true);
                    zip = get('postal_code');
                  }

                  // Fallback: parse from formatted address string "Street, City, ST ZIP, USA"
                  if (!city && formatted) {
                    const parts = formatted.split(',').map(p => p.trim());
                    // parts[0]=street, parts[1]=city, parts[2]="ST ZIP", parts[3]="USA"
                    if (parts.length >= 3) {
                      city = parts[1] || '';
                      const stateZip = (parts[2] || '').trim().split(' ');
                      state = stateZip[0] || '';
                      zip = stateZip[1] || '';
                    }
                  }

                  const address1 = [streetNumber, route].filter(Boolean).join(' ').trim()
                    || (formatted.split(',')[0] || '').trim();

                  console.log('📍 parsed:', { address1, city, state, zip });

                  // Overwrite the widget's input to show only the street address
                  const widgetInput = pac.querySelector('input');
                  if (widgetInput && address1) widgetInput.value = address1;

                  setFormData(prev => ({
                    ...prev,
                    address: address1 || prev.address,
                    city: city || prev.city,
                    state: (state || prev.state || '').toUpperCase(),
                    zip: zip || prev.zip,
                  }));

                  setPlaceMeta({
                    placeId: place.id || '',
                    formattedAddress: formatted,
                    lat: place.location?.lat?.() ?? null,
                    lng: place.location?.lng?.() ?? null,
                    source: 'places',
                  });
                } catch (err) {
                  console.warn('Place select handler error:', err);
                }
              };

              pac.addEventListener('gmp-placeselect', handlePlaceSelect);
              pac.addEventListener('gmp-select', handlePlaceSelect);
            } catch (err) {
              console.warn('PlaceAutocompleteElement init failed:', err);
            }
          }
          if (tries >= maxTries) clearInterval(timer);
        }, 250);

        return () => clearInterval(timer);
      }, []);

      // Mobile detection
      useEffect(() => {
        const onResize = () => setIsMobile(window.innerWidth < 768);
        window.addEventListener('resize', onResize);
        return () => window.removeEventListener('resize', onResize);
      }, []);


      useEffect(() => {
        loadFarrierInfo();
      }, []);

      const loadFarrierInfo = async () => {
        try {
          if (db) {
            const doc = await db.collection('farriers').doc(farrierId).get();
            if (doc.exists) {
              setFarrierInfo(doc.data());
            }
          } else {
            // Demo mode
            setFarrierInfo({
              businessName: "Demo Farrier Services",
              email: "demo@farrier.com"
            });
          }
        } catch (error) {
          console.error('Error loading farrier info:', error);
        }
        setLoading(false);
      };

      const loadBookedSlots = async (date) => {
        if (!db || !date) return;
        setLoadingSlots(true);
        try {
          const snap = await db.collection('appointments')
            .where('farrierId', '==', farrierId)
            .where('requestedDate', '==', date)
            .where('status', 'in', ['pending', 'confirmed'])
            .get();
          const times = snap.docs.map(d => d.data().requestedTime).filter(Boolean);
          setBookedSlots(times);
        } catch (error) {
          console.error('Error loading booked slots:', error);
          setBookedSlots([]);
        }
        setLoadingSlots(false);
      };

      const handleSubmit = async (e) => {
        e.preventDefault();

        const isPOBox = (s) => /^\s*p\.?\s*o\.?\s*box\b/i.test(String(s || ''));
        if (isPOBox(formData.address)) {
          alert("PO Boxes can't be routed. Please enter the barn/service address.");
          return;
        }

        // If customer used Google Places, we keep placeId + lat/lng for accurate Smart Route driving directions

        try {
          if (db) {
            // Save appointment request to Firestore
            await db.collection('appointments').add({
              farrierId: farrierId,
              customerName: formData.name || '',
              farmName: formData.farmName || '',
              phone: formData.phone || '',
              email: formData.email || '',
              services: formData.services || [],
              numberOfHorses: formData.numberOfHorses || '',
              address: formData.address || '',
              city: formData.city || '',
              state: formData.state || '',
              zip: formData.zip || '',
              comments: formData.comments || '',
              requestedDate: formData.date || '',
              requestedTime: formData.time || '',
              status: 'pending',
              smsConsent: formData.smsConsent === true,
              // Address normalization (for Smart Route)
              formattedAddress: placeMeta.formattedAddress || '',
              placeId: placeMeta.placeId || '',
              geo: (placeMeta.lat != null && placeMeta.lng != null) ? { lat: placeMeta.lat, lng: placeMeta.lng } : null,
              createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });

            // Auto-create or update customer record
            try {
              const fullAddress = [formData.address, formData.city, formData.state, formData.zip]
                .filter(Boolean).join(', ').trim();

              const customerPayload = {
                name: formData.name,
                farmName: formData.farmName,
                email: formData.email,
                phone: formData.phone,
                address: fullAddress,

                // Address normalization (for Smart Route)
                formattedAddress: placeMeta.formattedAddress || '',
                placeId: placeMeta.placeId || '',
                geo: (placeMeta.lat != null && placeMeta.lng != null) ? { lat: placeMeta.lat, lng: placeMeta.lng } : null,
                farrierId: farrierId,
                smsOptOut: formData.smsConsent ? false : true,
                updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
              };

              // Search by email first, fall back to phone
              let existingSnap = formData.email
                ? await db.collection('customers')
                    .where('farrierId', '==', farrierId)
                    .where('email', '==', formData.email)
                    .limit(1).get()
                : { empty: true };

              if (existingSnap.empty && formData.phone) {
                existingSnap = await db.collection('customers')
                  .where('farrierId', '==', farrierId)
                  .where('phone', '==', formData.phone)
                  .limit(1).get();
              }

              if (existingSnap.empty) {
                await db.collection('customers').add({
                  ...customerPayload,
                  createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                  source: 'qr_booking',
                });
                console.log('✅ Customer profile created');
              } else {
                await existingSnap.docs[0].ref.update(customerPayload);
                console.log('✅ Customer profile updated');
              }
            } catch (error) {
              console.error('Note: Could not save customer profile:', error);
              // Don't fail the booking if customer save fails
            }

            // Auto-create a Firebase Auth account for the customer so they can access the portal.
            // We set a flag first so onAuthStateChanged ignores these transient sign-in/sign-out events.
            let portalPassword = null;
            let portalAccountCreated = false;
            if (formData.email && auth) {
              window._creatingCustomerPortalAccount = true;
              try {
                // Generate a random readable password: e.g. "Horse#4B2x9"
                const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZabcdefghjkmnpqrstuvwxyz23456789';
                portalPassword = 'Horse#' + Array.from({length: 6}, () => chars[Math.floor(Math.random() * chars.length)]).join('');
                await auth.createUserWithEmailAndPassword(formData.email, portalPassword);
                portalAccountCreated = true;
                console.log('✅ Customer portal account created for', formData.email);
                // Sign back out — we don't want to leave the customer signed in on the farrier's booking page
                await auth.signOut();
              } catch (authErr) {
                if (authErr.code === 'auth/email-already-in-use') {
                  // Account already exists — they can use "Forgot Password" on the portal
                  portalAccountCreated = false;
                  portalPassword = null;
                  console.log('ℹ️ Customer portal account already exists for', formData.email);
                } else {
                  console.warn('⚠️ Could not create customer portal account:', authErr.message);
                  portalPassword = null;
                }
              } finally {
                window._creatingCustomerPortalAccount = false;
              }
            }

            // Send booking notification emails (farrier + customer)
            console.log('📧 farrierInfo at booking time:', JSON.stringify(farrierInfo));
            try {
              await fetch('/api/send-booking-emails', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                  // Farrier
                  farrierEmail: farrierInfo?.email || farrierInfo?.contactEmail || farrierInfo?.notificationEmail || '',
                  farrierBusinessName: farrierInfo?.businessName || '',
                  // Customer / booking
                  customerName: formData.name,
                  farmName: formData.farmName,
                  customerEmail: formData.email,
                  customerPhone: formData.phone,
                  services: formData.services,
                  numberOfHorses: formData.numberOfHorses,
                  address: formData.address,
                  city: formData.city,
                  state: formData.state,
                  zip: formData.zip,
                  formattedAddress: placeMeta.formattedAddress || '',
                  placeId: placeMeta.placeId || '',
                  geo: (placeMeta.lat != null && placeMeta.lng != null) ? { lat: placeMeta.lat, lng: placeMeta.lng } : null,
                  requestedDate: formData.date,
                  requestedTime: formData.time,
                  comments: formData.comments,
                  // Portal credentials (only present if a new account was just created)
                  portalPassword: portalPassword,
                  portalAccountCreated: portalAccountCreated,
                  portalUrl: window.location.origin + '/customer-portal.html',
                })
              });
              console.log('✅ Booking emails sent');
            } catch (emailErr) {
              console.warn('⚠️ Booking emails failed (non-blocking):', emailErr);
            }
          }
          
          setStep('success');
        } catch (error) {
          console.error('Error submitting booking:', error);
          alert('Error submitting booking. Please try again.');
        }
      };

      const services = [
        'Routine Trim',
        'Shoeing (All 4)',
        'Shoeing (Front Only)',
        'Corrective Shoeing',
        'Hoof Care Consultation'
      ];

      // Convert 24-hour time to 12-hour AM/PM format
      const formatTime = (time24) => {
        const [hours, minutes] = time24.split(':').map(Number);
        const period = hours >= 12 ? 'PM' : 'AM';
        const hours12 = hours % 12 || 12; // Convert 0 to 12 for midnight
        return `${hours12}:${String(minutes).padStart(2, '0')} ${period}`;
      };

      // Generate time slots based on farrier's availability for selected date
      const getAvailableSlots = () => {
        if (!formData.date) {
          return []; // No slots until date is selected
        }

        // Parse date correctly to avoid timezone issues
        // formData.date is in format "YYYY-MM-DD"
        const [year, month, day] = formData.date.split('-').map(Number);
        const selectedDate = new Date(year, month - 1, day); // Create date in local timezone
        const dayName = selectedDate.toLocaleDateString('en-US', { weekday: 'long' }).toLowerCase();
        
        console.log('Selected date:', formData.date);
        console.log('Parsed as:', selectedDate);
        console.log('Day name:', dayName);
        
        // Default availability if farrier hasn't set it up yet (Mon-Fri 9-5)
        const defaultAvailability = {
          monday: { enabled: true, start: '09:00', end: '17:00' },
          tuesday: { enabled: true, start: '09:00', end: '17:00' },
          wednesday: { enabled: true, start: '09:00', end: '17:00' },
          thursday: { enabled: true, start: '09:00', end: '17:00' },
          friday: { enabled: true, start: '09:00', end: '17:00' },
          saturday: { enabled: false, start: '09:00', end: '17:00' },
          sunday: { enabled: false, start: '09:00', end: '17:00' }
        };

        const availability = farrierInfo?.availability || defaultAvailability;
        const dayAvailability = availability[dayName];

        console.log('Day availability:', dayAvailability);

        if (!dayAvailability || !dayAvailability.enabled) {
          return []; // No slots if farrier doesn't work this day
        }

        // Generate 2-hour slots from start to end time
        const slots = [];
        const [startHour, startMin] = dayAvailability.start.split(':').map(Number);
        const [endHour, endMin] = dayAvailability.end.split(':').map(Number);
        
        let currentHour = startHour;
        let currentMin = startMin;
        
        while (currentHour < endHour || (currentHour === endHour && currentMin < endMin)) {
          const timeStr = `${String(currentHour).padStart(2, '0')}:${String(currentMin).padStart(2, '0')}`;
          slots.push(timeStr);
          
          // Add 2 hours for next slot
          currentMin += 120;
          currentHour += Math.floor(currentMin / 60);
          currentMin = currentMin % 60;
        }

        console.log('Generated slots:', slots);
        return slots;
      };

      const availableSlots = getAvailableSlots();

      if (loading) {
        return (
          <div style={{display: 'flex', justifyContent: 'center', alignItems: 'center', height: '100vh'}}>

    function DashboardView({ userId }) {
  const [stats, setStats] = useState({
    monthAppointments: 0,
    totalRevenue: 0,
    outstandingInvoices: 0,
    upcomingWeek: 0,
  });
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    loadStats();
  }, [userId]);

  const loadStats = async () => {
    try {
      if (!db || !userId) {
        setStats({ monthAppointments: 0, totalRevenue: 0, outstandingInvoices: 0, upcomingWeek: 0 });
        setLoading(false);
        return;
      }

      // ---- Appointments ----
      let monthAppointments = 0;
      let upcomingWeek = 0;

      const now = new Date();
      const monthStart = new Date(now.getFullYear(), now.getMonth(), 1);
      const monthEnd = new Date(now.getFullYear(), now.getMonth() + 1, 0);
      const weekEnd = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 7);

      const apptSnap = await db.collection('appointments')
        .where('farrierId', '==', userId)
        .get();

      apptSnap.forEach(doc => {
        const a = doc.data() || {};
        const dStr = a.requestedDate || a.date || "";
        if (!dStr) return;

        // expected "YYYY-MM-DD"
        const parts = String(dStr).split('-').map(Number);
        if (parts.length !== 3 || !parts[0] || !parts[1] || !parts[2]) return;
        const d = new Date(parts[0], parts[1] - 1, parts[2]);

        if (d >= monthStart && d <= monthEnd) monthAppointments++;
        if (d >= new Date(now.getFullYear(), now.getMonth(), now.getDate()) && d < weekEnd) upcomingWeek++;
      });

      // ---- Invoices / Revenue (optional) ----
      // If you haven't built invoices yet, these will remain 0.
      let totalRevenue = 0;
      let outstandingInvoices = 0;
      try {
        const invSnap = await db.collection('invoices')
          .where('farrierId', '==', userId)
          .get();

        invSnap.forEach(doc => {
          const inv = doc.data() || {};
          const amount = Number(inv.amount || inv.total || inv.totalAmount || 0) || 0;
          const status = String(inv.status || '').toLowerCase();

          const paidAmt = Number(inv.paidAmount || 0) || (Array.isArray(inv.payments) ? inv.payments.reduce((s,p) => s+(p.amount||0), 0) : 0) || (status === 'paid' || status === 'settled' ? amount : 0);
          totalRevenue += paidAmt;
          if (status === 'outstanding' || status === 'partial') outstandingInvoices += Math.max(0, amount - paidAmt);
        });
      } catch (e) {
        // invoices collection may not exist yet - that's fine
      }

      setStats({
        monthAppointments,
        totalRevenue,
        outstandingInvoices,
        upcomingWeek,
      });
    } catch (err) {
      console.error('❌ Error loading dashboard stats:', err);
      setStats({ monthAppointments: 0, totalRevenue: 0, outstandingInvoices: 0, upcomingWeek: 0 });
    }
    setLoading(false);
  };

  const kpis = [
    { label: 'Appointments This Month', value: loading ? '…' : String(stats.monthAppointments), change: 'Live', positive: true },
    { label: 'Total Revenue', value: loading ? '…' : `$${stats.totalRevenue.toFixed(2)}`, change: 'Paid invoices', positive: true },
    { label: 'Outstanding Invoices', value: loading ? '…' : `$${stats.outstandingInvoices.toFixed(2)}`, change: 'Unpaid', positive: true },
    { label: 'This Week', value: loading ? '…' : String(stats.upcomingWeek), change: 'Upcoming', positive: true },
  ];

  return (
    <div>
      <h1 style={{marginBottom: '1.5rem', fontSize: '2rem', color: 'var(--primary)'}}>Dashboard Overview</h1>

      <div className="dashboard-grid">
        {kpis.map((kpi, idx) => (
          <div key={idx} className="stat-card">
            <div className="stat-label">{kpi.label}</div>
            <div className="stat-value">{kpi.value}</div>
            <div className={`stat-change ${kpi.positive ? 'positive' : ''}`}>
              {kpi.change}
            </div>
          </div>
        ))}
      </div>

      <div className="card">
        <h2>Recent Activity</h2>
        <p style={{color: 'var(--text-muted)'}}>
          Your real appointments are pulled from Firestore (appointments where farrierId = your userId).
        </p>
      </div>
    </div>
  );
}

function CalendarView({ userId }) {
      const [currentDate, setCurrentDate] = useState(new Date());
      const [appointments, setAppointments] = useState([]);
      const [loading, setLoading] = useState(true);

      useEffect(() => {
        loadAppointments();
      }, []);

      const loadAppointments = async () => {
        if (db) {
          try {
            const snapshot = await db.collection('appointments')
              .where('farrierId', '==', userId)
              .get();
            
            const appointmentData = snapshot.docs.map(doc => {
              const data = doc.data();
              
              // Clean up time format: convert "HH:MM:SS" to "HH:MM"
              if (data.requestedTime && data.requestedTime.includes(':')) {
                const timeParts = data.requestedTime.split(':');
                if (timeParts.length === 3) {
                  data.requestedTime = `${timeParts[0]}:${timeParts[1]}`;
                }
              }
          
              return {
                id: doc.id,
                ...data
              };
            });
            
            setAppointments(appointmentData);
            console.log('✅ Loaded appointments for calendar:', appointmentData.length);
          } catch (error) {
            console.error('❌ Error loading appointments:', error);
          }
        }
        setLoading(false);
      };

      // Count appointments by date
      const getAppointmentCounts = () => {
        const counts = {};
        appointments.forEach(apt => {
          if (apt.requestedDate) {
            const date = apt.requestedDate; // Format: "2026-02-15"
            if (!counts[date]) {
              counts[date] = { confirmed: 0, pending: 0, total: 0 };
            }
            counts[date].total++;
            // Handle status - if not set or 'pending', treat as pending
            const status = apt.status || 'pending';
            
            if (status === 'confirmed') {
              counts[date].confirmed++;
            } else {
              // Treat everything else (pending, undefined, null) as pending
              counts[date].pending++;
            }
            
            console.log(`📅 Date: ${date}, Status: ${status}, Counts:`, counts[date]);
          }
        });
        console.log('📊 Final appointment counts:', counts);
        return counts;
      };

      const appointmentCounts = getAppointmentCounts();
      
      const daysInMonth = new Date(
        currentDate.getFullYear(),
        currentDate.getMonth() + 1,
        0
      ).getDate();

      const firstDay = new Date(
        currentDate.getFullYear(),
        currentDate.getMonth(),
        1
      ).getDay();

      const monthNames = ['January', 'February', 'March', 'April', 'May', 'June',
        'July', 'August', 'September', 'October', 'November', 'December'];

      const days = [];
      for (let i = 0; i < firstDay; i++) {
        days.push(<div key={`empty-${i}`} className="calendar-day"></div>);
      }
      for (let i = 1; i <= daysInMonth; i++) {
        const isToday = i === new Date().getDate() && 
                        currentDate.getMonth() === new Date().getMonth() &&
                        currentDate.getFullYear() === new Date().getFullYear();
        
        // Format date to match appointment requestedDate format (YYYY-MM-DD)
        const dateStr = `${currentDate.getFullYear()}-${String(currentDate.getMonth() + 1).padStart(2, '0')}-${String(i).padStart(2, '0')}`;
        const counts = appointmentCounts[dateStr];
        
        days.push(
          <div 
            key={i} 
            className={`calendar-day ${isToday ? 'today' : ''}`}
            style={{
              display: 'flex',
              flexDirection: 'column',
              alignItems: 'center',
              justifyContent: 'flex-start',
              padding: '0.5rem',
              minHeight: '80px',
              position: 'relative'
            }}
          >
            <div style={{fontWeight: '600', marginBottom: '0.25rem'}}>{i}</div>
            {counts && counts.total > 0 && (
              <div style={{
                display: 'flex',
                flexDirection: 'column',
                gap: '0.25rem',
                fontSize: '0.75rem',
                width: '100%',
                alignItems: 'center'
              }}>
                {counts.confirmed > 0 && (
                  <div style={{
                    display: 'flex',
                    alignItems: 'center',
                    gap: '0.25rem',
                    padding: '0.25rem 0.5rem',
                    background: '#dcfce7',
                    color: '#166534',
                    borderRadius: '6px',
                    fontWeight: '700',
                    fontSize: '0.75rem'
                  }}>
                    ✓ {counts.confirmed}
                  </div>
                )}
                {counts.pending > 0 && (
                  <div style={{
                    display: 'flex',
                    alignItems: 'center',
                    gap: '0.25rem',
                    padding: '0.25rem 0.5rem',
                    background: '#2a2010',
                    color: '#92400e',
                    borderRadius: '6px',
                    fontWeight: '700',
                    fontSize: '0.75rem'
                  }}>
                    ⏳ {counts.pending}
                  </div>
                )}
              </div>
            )}
          </div>
        );
      }

      return (
        <div>
          <h1 style={{marginBottom: '1.5rem', fontSize: '2rem', color: 'var(--primary)'}}>Calendar</h1>
          
          <div className="calendar">
            <div className="calendar-header">
              <h2 className="calendar-title">
                {monthNames[currentDate.getMonth()]} {currentDate.getFullYear()}
              </h2>
              <div className="calendar-nav">
                <button className="btn btn-sm btn-outline" onClick={() => {
                  const newDate = new Date(currentDate);
                  newDate.setMonth(newDate.getMonth() - 1);
                  setCurrentDate(newDate);
                }}>
                  ←
                </button>
                <button className="btn btn-sm btn-outline" onClick={() => {
                  const newDate = new Date(currentDate);
                  newDate.setMonth(newDate.getMonth() + 1);
                  setCurrentDate(newDate);
                }}>
                  →
                </button>
              </div>
            </div>

            <div className="calendar-grid">
              {['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'].map(day => (
                <div key={day} className="calendar-day header">{day}</div>
              ))}
              {days}
            </div>
          </div>

          {/* Legend */}
          <div style={{
            marginTop: '1rem',
            padding: '1rem',
            background: '#f9fafb',
            borderRadius: '8px',
            display: 'flex',
            gap: '1.5rem',
            alignItems: 'center',
            justifyContent: 'center',
            flexWrap: 'wrap'
          }}>
            <div style={{display: 'flex', alignItems: 'center', gap: '0.5rem'}}>
              <div style={{
                padding: '0.25rem 0.5rem',
                background: '#dcfce7',
                color: '#166534',
                borderRadius: '4px',
                fontSize: '0.75rem',
                fontWeight: '600'
              }}>
                ✓ {appointments.filter(a => (a.status || 'pending').toLowerCase() === 'confirmed').length}
              </div>
              <span style={{fontSize: '0.875rem', color: 'var(--text-muted)'}}>Confirmed</span>
            </div>

            <div style={{display: 'flex', alignItems: 'center', gap: '0.5rem'}}>
              <div style={{
                padding: '0.25rem 0.5rem',
                background: '#2a2010',
                color: '#92400e',
                borderRadius: '4px',
                fontSize: '0.75rem',
                fontWeight: '600'
              }}>
                ⏳ {appointments.filter(a => (a.status || 'pending').toLowerCase() !== 'confirmed').length}
              </div>
              <span style={{fontSize: '0.875rem', color: 'var(--text-muted)'}}>Pending</span>
            </div>

            <div style={{fontSize: '0.875rem', color: 'var(--text-muted)'}}>
              {appointments.length} total appointment{appointments.length !== 1 ? 's' : ''}
            </div>
          </div>
        </div>
      );
    }

    function AppointmentsView({ userId, userProfile }) {
      const [appointments, setAppointments] = useState([]);
      const [loading, setLoading] = useState(true);
      const [showInvoiceModal, setShowInvoiceModal] = useState(false);
      const [selectedAppointment, setSelectedAppointment] = useState(null);
      const [sortOrder, setSortOrder] = useState('newest'); // 'newest' or 'oldest'
      const [appointmentFilter, setAppointmentFilter] = useState('all'); // all, pending, confirmed, cancelled, invoiced, thisMonth, lastMonth
      const [showEditModal, setShowEditModal] = useState(false);
      const [editingAppointment, setEditingAppointment] = useState(null);
      const [showCancelApptModal, setShowCancelApptModal] = useState(false);
      const [cancellingAppointment, setCancellingAppointment] = useState(null);

      useEffect(() => {
        loadAppointments();
      }, []);

      const loadAppointments = async () => {
        if (db) {
          try {
            const snapshot = await db.collection('appointments')
              .where('farrierId', '==', userId)
              .get();
            
            const appointmentData = snapshot.docs.map(doc => {
              const data = doc.data();
              
              // Clean up time format: convert "HH:MM:SS" to "HH:MM"
              if (data.requestedTime && data.requestedTime.includes(':')) {
                const timeParts = data.requestedTime.split(':');
                if (timeParts.length === 3) {
                  // Has seconds, remove them
                  data.requestedTime = `${timeParts[0]}:${timeParts[1]}`;
                  console.log(`🕐 Fixed time format: ${doc.data().requestedTime} → ${data.requestedTime}`);
                }
              }
              
              return {
                id: doc.id,
                ...data
              };
            });
            
            // One-time cleanup: Fix time formats in database
            appointmentData.forEach(async (apt) => {
              if (apt.requestedTime && apt.requestedTime.split(':').length === 3) {
                // This appointment has HH:MM:SS format, fix it in the database
                const timeParts = apt.requestedTime.split(':');
                const cleanTime = `${timeParts[0]}:${timeParts[1]}`;
                try {
                  await db.collection('appointments').doc(apt.id).update({
                    requestedTime: cleanTime
                  });
                  console.log(`✅ Fixed time in database for ${apt.id}: ${apt.requestedTime} → ${cleanTime}`);
                } catch (error) {
                  console.error(`❌ Error fixing time for ${apt.id}:`, error);
                }
              }
            });
            
            setAppointments(appointmentData);
            console.log('✅ Loaded appointments:', appointmentData.length);
          } catch (error) {
            console.error('❌ Error loading appointments:', error);
          }
        }
        setLoading(false);
      };

      // Filter appointments
      const getFilteredAppointments = () => {
        const now = new Date();
        const currentYear = now.getFullYear();
        const currentMonth = now.getMonth();

        return appointments.filter(apt => {
          // Status filters
          if (appointmentFilter === 'pending') return apt.status === 'pending';
          if (appointmentFilter === 'confirmed') return apt.status === 'confirmed' || apt.status === 'confirmed_by_customer';
          if (appointmentFilter === 'cancelled') return apt.status === 'cancelled';
          if (appointmentFilter === 'invoiced') return !!apt.invoiced;

          // 'all' and date filters: hide cancelled by default
          if (apt.status === 'cancelled') return false;

          // Date filters - use requestedDate (appointment date)
          if (!apt.requestedDate) return true;
          const aptDate = new Date(apt.requestedDate);
          const aptYear = aptDate.getFullYear();
          const aptMonth = aptDate.getMonth();

          if (appointmentFilter === 'thisMonth') {
            return aptYear === currentYear && aptMonth === currentMonth;
          }
          if (appointmentFilter === 'lastMonth') {
            const lastMonth = currentMonth === 0 ? 11 : currentMonth - 1;
            const lastMonthYear = currentMonth === 0 ? currentYear - 1 : currentYear;
            return aptYear === lastMonthYear && aptMonth === lastMonth;
          }

          return true;
        });
      };

      // Get sorted appointments based on sortOrder
      const getSortedAppointments = () => {
        const filtered = getFilteredAppointments();
        return [...filtered].sort((a, b) => {
          if (!a.createdAt || !b.createdAt) return 0;
          const dateA = a.createdAt.toDate();
          const dateB = b.createdAt.toDate();
          return sortOrder === 'newest' ? dateB - dateA : dateA - dateB;
        });
      };

      const sortedAppointments = getSortedAppointments();

      // Auto-refresh Google OAuth token if expired, returns valid token or null
      const getValidCalendarToken = async (up) => {
        if (!up?.googleCalendarConnected || !up?.googleAccessToken) return null;
        // Quick test to see if current token is valid
        const testRes = await fetch('https://www.googleapis.com/calendar/v3/calendars/primary', {
          headers: { 'Authorization': `Bearer ${up.googleAccessToken}` }
        }).catch(() => null);
        if (testRes?.ok) return up.googleAccessToken;
        // Token expired — try to refresh
        console.log('🔄 Access token expired, attempting refresh...');
        if (!up?.googleRefreshToken) {
          console.warn('⚠️ No refresh token — user needs to reconnect Google Calendar');
          return null;
        }
        try {
          const refreshRes = await fetch('/api/google-calendar-auth?action=refresh', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ refresh_token: up.googleRefreshToken })
          });
          if (!refreshRes.ok) return null;
          const refreshData = await refreshRes.json();
          const newToken = refreshData.access_token;
          if (!newToken) return null;
          if (db && userId) {
            await db.collection('farriers').doc(userId).update({ googleAccessToken: newToken });
          }
          console.log('✅ Token refreshed successfully');
          return newToken;
        } catch (e) {
          console.error('❌ Token refresh failed:', e);
          return null;
        }
      };

      const createCalendarEvent = async (appointment, userProfile) => {
        console.log('=== CREATE CALENDAR EVENT START ===');
        if (!userProfile?.googleCalendarConnected) {
          console.log('ℹ️ Google Calendar not connected — skipping sync');
          return false;
        }
        const accessToken = await getValidCalendarToken(userProfile);
        if (!accessToken) {
          console.warn('⚠️ Could not get valid calendar token — skipping calendar sync');
          return false;
        }
        try {
          // Create calendar event
          const eventStartTime = new Date(`${appointment.requestedDate}T${appointment.requestedTime}:00`);
          const eventEndTime = new Date(eventStartTime.getTime() + 2 * 60 * 60 * 1000); // 2 hours later

          console.log('📅 Event times:', {
            start: eventStartTime.toISOString(),
            end: eventEndTime.toISOString()
          });

          // Build services list
          let servicesList = '';
          if (appointment.services && appointment.services.length > 0) {
            servicesList = appointment.services.map(s => `   • ${s}`).join('\n');
          } else {
            servicesList = '   (No services specified)';
          }

          const event = {
            summary: `🐴 Farrier - ${appointment.customerName}${appointment.farmName ? ` (${appointment.farmName})` : ''}`,
            description: `━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
📋 APPOINTMENT DETAILS
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

👤 CUSTOMER INFORMATION:
   Name: ${appointment.customerName}${appointment.farmName ? `\n   Farm/Business: ${appointment.farmName}` : ''}
   Phone: ${appointment.phone}
${appointment.email ? `   Email: ${appointment.email}` : ''}

🔧 SERVICES REQUESTED:
${servicesList}

🐴 HORSES:
${appointment.numberOfHorses ? `   Number of Horses: ${appointment.numberOfHorses}` : '   (Not specified)'}

📍 LOCATION:
${appointment.address ? `   ${appointment.address}\n   ${appointment.city}${appointment.state ? `, ${appointment.state}` : ''}${appointment.zip ? ` ${appointment.zip}` : ''}` : '   (No address provided)'}

💬 SPECIAL REQUESTS/NOTES:
${appointment.comments ? `   ${appointment.comments}` : '   (None)'}

━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
⏰ Scheduled: ${appointment.requestedDate} at ${appointment.requestedTime}
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━`,
            location: appointment.address ? `${appointment.address}, ${appointment.city}${appointment.state ? `, ${appointment.state}` : ''}${appointment.zip ? ` ${appointment.zip}` : ''}` : '',
            start: {
              dateTime: eventStartTime.toISOString(),
              timeZone: 'America/New_York'
            },
            end: {
              dateTime: eventEndTime.toISOString(),
              timeZone: 'America/New_York'
            }
          };

          console.log('📤 Sending event to Google Calendar:', event);

          const response = await fetch('https://www.googleapis.com/calendar/v3/calendars/primary/events', {
            method: 'POST',
            headers: {
              'Authorization': `Bearer ${accessToken}`,
              'Content-Type': 'application/json'
            },
            body: JSON.stringify(event)
          });

          console.log('📥 Response status:', response.status);

          if (!response.ok) {
            const errorData = await response.json();
            console.error('❌ Calendar API error:', errorData);
            throw new Error(`Failed to create calendar event: ${errorData.error?.message || 'Unknown error'}`);
          }

          const data = await response.json();
          console.log('✅ Calendar event created successfully!', data);
          
          // Save event ID to appointment
          if (db) {
            await db.collection('appointments').doc(appointment.id).update({
              googleEventId: data.id
            });
            console.log('✅ Saved event ID to appointment');
          }

          return true;
        } catch (error) {
          console.error('❌ Calendar error:', error);
          return false; // Silent fail — appointment is already confirmed in Firebase
        }
      };

      const deleteCalendarEvent = async (appointment, userProfile) => {
        console.log('🗑️ DELETE CALENDAR EVENT START');
        
        if (!appointment.googleEventId) {
          console.log('⚠️ No Google Event ID found - event may not be in calendar');
          return true; // Not an error, just wasn't synced yet
        }
        
        if (!userProfile?.googleCalendarConnected || !userProfile?.googleAccessToken) {
          console.error('❌ Calendar not connected');
          return false;
        }

        try {
          // Use existing access token (no refresh for now)
          const accessToken = userProfile.googleAccessToken;
          
          console.log('🗑️ Deleting event from Google Calendar:', appointment.googleEventId);
          
          const response = await fetch(`https://www.googleapis.com/calendar/v3/calendars/primary/events/${appointment.googleEventId}`, {
            method: 'DELETE',
            headers: {
              'Authorization': `Bearer ${accessToken}`
            }
          });

          if (response.ok || response.status === 404) {
            console.log('✅ Calendar event deleted successfully!');
            return true;
          } else {
            console.error('❌ Failed to delete calendar event:', response.status);
            return false;
          }
        } catch (error) {
          console.error('❌ Calendar deletion error:', error);
          return false;
        }
      };

      const updateStatus = async (appointmentId, newStatus) => {
        console.log('🔵 updateStatus called:', { appointmentId, newStatus });
        
        if (db) {
          await db.collection('appointments').doc(appointmentId).update({
            status: newStatus,
            updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
            ...(newStatus === 'confirmed' ? { confirmedAt: firebase.firestore.FieldValue.serverTimestamp() } : {}),
            ...(newStatus === 'cancelled' ? { cancelledAt: firebase.firestore.FieldValue.serverTimestamp() } : {})
          });
          console.log('✅ Status updated in Firebase');
          
          const appointment = appointments.find(apt => apt.id === appointmentId);
          
          // If confirming, add to Google Calendar + send SMS
          if (newStatus === 'confirmed') {
            console.log('🟢 Status is confirmed');
            if (appointment) {
              // Calendar sync — silent, non-blocking
              if (userProfile?.googleCalendarConnected) {
                createCalendarEvent(appointment, userProfile).then(success => {
                  console.log(success ? '✅ Added to Google Calendar' : '⚠️ Calendar sync skipped (token may need refresh — reconnect in My QR Code tab)');
                });
              }
              // Send SMS confirmation if enabled
              if (userProfile?.smsEnabled && appointment.phone) {
                const bizName = userProfile?.businessName || 'Your Farrier';
                const msg = `Hi ${appointment.customerName}, your appointment with ${bizName} is confirmed for ${appointment.requestedDate} at ${appointment.requestedTime}. Reply CONFIRM to confirm or STOP to opt out.`;
                await sendSms(appointment.phone, msg);
              }
              // Send confirmation email to customer (non-blocking)
              if (appointment.email) {
                fetch('/api/send-email', {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({
                    action: 'confirmation',
                    customerEmail: appointment.email,
                    customerName: appointment.customerName,
                    farmName: appointment.farmName || '',
                    farrierBusinessName: userProfile?.businessName || '',
                    farrierEmail: userProfile?.email || '',
                    farrierPhone: userProfile?.phone || '',
                    services: appointment.services,
                    numberOfHorses: appointment.numberOfHorses,
                    requestedDate: appointment.requestedDate,
                    requestedTime: appointment.requestedTime,
                    address: appointment.address,
                    city: appointment.city,
                    state: appointment.state,
                    zip: appointment.zip,
                    comments: appointment.comments,
                  })
                }).then(async (r) => {
                  const data = await r.json().catch(() => ({}));
                  if (r.ok) {
                    console.log('✅ Confirmation email sent to', appointment.email);
                  } else {
                    console.error('❌ Confirmation email API error:', r.status, data);
                  }
                }).catch(e => console.error('❌ Confirmation email network error:', e));
              } else {
                console.warn('⚠️ No customer email on appointment — skipping confirmation email');
              }
            } else {
              console.error('❌ Appointment not found in local state');
            }
          }
          
          // If cancelling, remove from Google Calendar (only if connected)
          if (newStatus === 'cancelled') {
            if (appointment && userProfile?.googleCalendarConnected && appointment.googleEventId) {
              console.log('🔴 Status is cancelled, removing from calendar...');
              const deleted = await deleteCalendarEvent(appointment, userProfile);
              if (deleted) {
                alert('✓ Appointment cancelled and removed from your Google Calendar!');
              } else {
                alert('⚠️ Appointment cancelled, but could not remove from Google Calendar. Please remove it manually.');
              }
            }
            // No alert needed if calendar isn't connected — cancel is silent/fast
          }
          
          loadAppointments();
        }
      };

      // ── SMS helpers ──────────────────────────────────────────────────
      const sendSms = async (phone, message) => {
        try {
          const res = await fetch('/api/send-sms', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ to: phone, body: message })
          });
          const data = await res.json();
          return data.success === true;
        } catch (e) {
          console.error('SMS error:', e);
          return false;
        }
      };

      const isSmsEnabled = (customerPhone, customers) => {
        if (!userProfile?.smsEnabled) return false;
        if (!customerPhone) return false;
        // Check if customer has opted out
        const phone = customerPhone.replace(/\D/g, '');
        const customer = customers?.find(c => c.phone?.replace(/\D/g, '') === phone);
        if (customer?.smsOptOut) return false;
        return true;
      };

      const sendReminder = async (appointment) => {
        if (!userProfile?.smsEnabled || !appointment.phone) {
          alert('SMS not enabled. Enable it in Settings → SMS & Messaging.');
          return;
        }
        const bizName = userProfile?.businessName || 'Your Farrier';
        const message = `Hi ${appointment.customerName}, reminder: your appointment with ${bizName} is on ${appointment.requestedDate} at ${appointment.requestedTime}. Reply CONFIRM to confirm or STOP to opt out.`;
        const sent = await sendSms(appointment.phone, message);
        if (sent) {
          alert(`✅ Reminder sent to ${appointment.customerName}`);
        } else {
          alert('❌ Failed to send reminder. Check SMS settings.');
        }
      };

      const handleCreateInvoiceFromAppointment = (appointment) => {
        console.log('🎯 Creating invoice from appointment:', appointment);
        console.log('Customer Name:', appointment.customerName);
        console.log('Customer Email:', appointment.email);
        console.log('Customer Phone:', appointment.phone);
        setSelectedAppointment(appointment);
        setShowInvoiceModal(true);
      };

      const handleInvoiceCreated = async () => {
        // Mark appointment as invoiced
        if (selectedAppointment && db) {
          try {
            await db.collection('appointments').doc(selectedAppointment.id).update({
              invoiced: true,
              invoicedAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            console.log('✅ Appointment marked as invoiced');
            loadAppointments();
          } catch (error) {
            console.error('Error marking appointment as invoiced:', error);
          }
        }
        setShowInvoiceModal(false);
        setSelectedAppointment(null);
      };

      if (loading) {
        return (
          <div style={{display: 'flex', justifyContent: 'center', padding: '3rem'}}>
            <div className="spinner"></div>
          </div>
        );
      }

      return (
        <div>
          <div style={{display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '1.5rem'}}>
            <h1 style={{marginBottom: 0, fontSize: '2rem', color: 'var(--primary)'}}>Appointments</h1>
            {appointments.length > 0 && (
              <button
                onClick={() => setSortOrder(sortOrder === 'newest' ? 'oldest' : 'newest')}
                className="btn btn-sm btn-outline"
                style={{display: 'flex', alignItems: 'center', gap: '0.5rem'}}
              >
                {sortOrder === 'newest' ? '📅 Newest First' : '📅 Oldest First'}
              </button>
            )}
          </div>
          
          {appointments.length === 0 ? (
            <div className="card">
              <h2>No Appointments Yet</h2>
              <p style={{color: 'var(--text-muted)', marginBottom: '1.25rem'}}>

    function CreateAppointmentModal({ customer, userId, userProfile, onClose, onSaved }) {
      const [date, setDate] = useState('');
      const [time, setTime] = useState('');
      const [farmName, setFarmName] = useState(customer.farmName || '');
      const [numberOfHorses, setNumberOfHorses] = useState('1');
      const [services, setServices] = useState([]);
      const [address, setAddress] = useState(customer.address || '');
      const [city, setCity] = useState(customer.city || '');
      const [state, setState] = useState(customer.state || '');
      const [comments, setComments] = useState('');
      const [saving, setSaving] = useState(false);
      const [sendConfirmation, setSendConfirmation] = useState(false);

      const smsAvailable = userProfile?.smsEnabled && customer.phone && !customer.smsOptOut;

      const availableServices = [
        'Trim All Four', 'Reset All Four', 'Hot Shoeing All Four',
        'Dressage Shoes', 'Corrective Shoeing', 'Studs Installation',
        'Show Prep', 'Emergency Call'
      ];

      const fmtTime = (t) => {
        if (!t) return '';
        const [h, m] = t.split(':').map(Number);
        const ampm = h >= 12 ? 'PM' : 'AM';
        return `${h % 12 || 12}:${String(m).padStart(2,'0')} ${ampm}`;
      };

      const handleSave = async () => {
        if (!date || !time) return alert('Date and Time are required.');
        setSaving(true);
        try {
          await db.collection('appointments').add({
            farrierId: userId,
            customerName: customer.name,
            farmName: farmName || customer.farmName || '',
            email: customer.email || '',
            phone: customer.phone || '',
            address: address || '',
            city: city || '',
            state: state || '',
            services,
            numberOfHorses,
            comments,
            requestedDate: date,
            requestedTime: time,
            status: 'confirmed',
            source: 'farrier_created',
            createdAt: firebase.firestore.FieldValue.serverTimestamp(),
          });

          if (sendConfirmation && smsAvailable) {
            try {
              const bizName = userProfile?.businessName || 'Your Farrier';
              const serviceList = services.length > 0 ? services.join(', ') : 'your appointment';
              const msg = `Hi ${customer.name}, your appointment with ${bizName} is confirmed for ${date} at ${fmtTime(time)} for ${serviceList}. Reply STOP to opt out.`;
              await fetch('/api/send-sms', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ to: customer.phone, body: msg })
              });
            } catch (e) { console.error('SMS error:', e); }
          }

          onSaved();
        } catch (e) {
          alert('Error creating appointment: ' + e.message);
        }
        setSaving(false);
      };

      return (
        <div style={{ position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.5)', display: 'flex', alignItems: 'center', justifyContent: 'center', zIndex: 1000, padding: '1rem' }}>

            <div style={{ padding: '1.25rem 1.5rem', borderBottom: '2px solid var(--border)', display: 'flex', justifyContent: 'space-between', alignItems: 'center', position: 'sticky', top: 0, background: '#fff', zIndex: 1 }}>

                <div style={{ fontWeight: 700, color: '#0369a1' }}>👤 {customer.name}{customer.farmName ? ` — ${customer.farmName}` : ''}</div>
                <div style={{ fontSize: '0.85rem', color: 'var(--text)', marginTop: '0.2rem', display: 'flex', gap: '1rem', flexWrap: 'wrap' }}>

                  {customer.email && <span>✉️ {customer.email}</span>}

              {/* Farm/Business override */}

              </div>

              <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '1rem' }}>
                <div className="form-group" style={{ margin: 0 }}>

                  <input type="date" value={date} onChange={e => setDate(e.target.value)}
                    style={{ width: '100%', padding: '0.75rem', borderRadius: 8, border: '2px solid var(--border)', fontFamily: 'Outfit,sans-serif', fontSize: '1rem', boxSizing: 'border-box' }} />

              {/* Address */}

              <div style={{ display: 'grid', gridTemplateColumns: '1fr 90px', gap: '0.75rem' }}>
                <div className="form-group" style={{ margin: 0 }}>
                  <label>City</label>
                  <input type="text" value={city} onChange={e => setCity(e.target.value)} placeholder="City"

                <label>Notes</label>
                <textarea value={comments} onChange={e => setComments(e.target.value)}
                  placeholder="Gate codes, special instructions…" rows={3}
                  style={{ width: '100%', padding: '0.75rem', borderRadius: 8, border: '2px solid var(--border)', fontFamily: 'Outfit,sans-serif', fontSize: '1rem', resize: 'vertical', boxSizing: 'border-box' }} />

              {userProfile?.smsEnabled && customer.phone && (
                <div style={{ padding: '1rem', borderRadius: 10, border: `2px solid ${smsAvailable ? '#dcfce7' : '#fee2e2'}`, background: smsAvailable ? '#f0fdf4' : '#fff5f5' }}>

                  {saving ? '⏳ Saving…' : (sendConfirmation && smsAvailable ? '✅ Create & Send SMS' : '✅ Create Appointment')}
                </button>
              </div>

            </div>
          </div>
        </div>
      );

              .where('farrierId', '==', userId)
              .where('phone', '==', cleanPhone)

            if (!snap.empty) {
              setCustomerSmsOptOut(snap.docs[0].data().smsOptOut || false);
            }
          } catch (e) { /* silently ignore */ }
        };
        checkSmsStatus();
      }, []);

      const smsAvailable = userProfile?.smsEnabled && appointment.phone && !customerSmsOptOut;

      const fmtTime = (t) => {
        if (!t) return '';
        const [h, m] = t.split(':').map(Number);

        const h12 = h % 12 || 12;
        return `${h12}:${String(m).padStart(2, '0')} ${ampm}`;
      };

      const availableServices = [
        'Trim All Four',
        'Reset All Four',
        'Hot Shoeing All Four',
        'Dressage Shoes',
        'Corrective Shoeing',
        'Studs Installation',
        'Show Prep',
        'Emergency Call'
      ];

      const handleServiceToggle = (service) => {
        if (services.includes(service)) {
          setServices(services.filter(s => s !== service));
        } else {
          setServices([...services, service]);
        }
      };

      const updateGoogleCalendarEvent = async (updatedAppointment) => {
        if (!userProfile?.googleCalendarConnected || !userProfile?.googleAccessToken) {
          console.log('⚠️ Google Calendar not connected, skipping calendar update');
          return true;
        }

        if (!appointment.googleCalendarEventId) {
          console.log('⚠️ No Google Calendar event ID, cannot update');
          return true;
        }

        try {
          console.log('🔄 Updating Google Calendar event...');
          
          const startDateTime = `${date}T${time}:00`;
          const endDateTime = new Date(new Date(startDateTime).getTime() + 60 * 60 * 1000).toISOString();

          const event = {
            summary: `Farrier - ${updatedAppointment.customerName}${farmName ? ` (${farmName})` : ''}`,
            description: `Services: ${services.join(', ')}\nHorses: ${numberOfHorses || 'Not specified'}\nPhone: ${phone}${farmName ? `\nFarm/Business: ${farmName}` : ''}`,
            location: `${address}, ${city}, ${state} ${zip}`,
            start: {
              dateTime: new Date(startDateTime).toISOString(),
              timeZone: 'America/New_York'
            },
            end: {
              dateTime: endDateTime,
              timeZone: 'America/New_York'
            }
          };

          const response = await fetch(
            `https://www.googleapis.com/calendar/v3/calendars/primary/events/${appointment.googleCalendarEventId}`,
            {
              method: 'PATCH',
              headers: {
                'Authorization': `Bearer ${userProfile.googleAccessToken}`,
                'Content-Type': 'application/json'
              },
              body: JSON.stringify(event)
            }
          );

          if (!response.ok) {
            console.error('❌ Failed to update Google Calendar event:', await response.text());
            return false;
          }

          console.log('✅ Google Calendar event updated successfully');
          return true;
        } catch (error) {
          console.error('❌ Error updating Google Calendar:', error);
          return false;
        }
      };

      const handleSave = async () => {
        if (!phone || !date || !time) {
          alert('Please fill in Phone, Date, and Time');
          return;
        }

        setSaving(true);

        try {
          const updatedData = {
            phone,
            farmName: farmName || '',
            requestedDate: date,
            requestedTime: time,
            numberOfHorses: numberOfHorses || '',
            services,
            address: address || '',
            city: city || '',
            state: state || '',
            zip: zip || '',
            comments: comments || '',
            updatedAt: firebase.firestore.FieldValue.serverTimestamp()
          };

          // Update Firestore
          await db.collection('appointments').doc(appointment.id).update(updatedData);
          console.log('✅ Appointment updated in Firestore');

          // Update Google Calendar
          const calendarUpdated = await updateGoogleCalendarEvent({
            ...appointment,
            ...updatedData,
            customerName: appointment.customerName
          });

          // Send SMS notification if requested
          if (sendNotification && smsAvailable) {
            try {
              const bizName = userProfile?.businessName || 'Your Farrier';
              const serviceList = services.length > 0 ? services.join(', ') : 'your appointment';
              const msg = `Hi ${appointment.customerName}, your appointment with ${bizName} has been updated to ${date} at ${fmtTime(time)} for ${serviceList}. Reply STOP to opt out.`;
              const res = await fetch('/api/send-sms', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ to: phone, body: msg })
              });
              const data = await res.json();
              if (data.success) {
                console.log('✅ SMS notification sent');
              } else {
                console.warn('⚠️ SMS notification failed:', data);
              }
            } catch (smsErr) {
              console.error('SMS send error:', smsErr);

          }

          // Send update email to customer if requested
          if (sendUpdateEmail && appointment.email) {
            fetch('/api/send-email', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                action: 'update',
                customerEmail: appointment.email,
                customerName: appointment.customerName,
                farmName: farmName || appointment.farmName || '',
                farrierBusinessName: userProfile?.businessName || '',
                farrierEmail: userProfile?.email || '',
                farrierPhone: userProfile?.phone || '',
                bookingUrl: userProfile?.bookingUrl || '',
                services: services,
                numberOfHorses: numberOfHorses || '',
                requestedDate: date,
                requestedTime: time,
                address: address || '',
                city: city || '',
                state: state || '',
                zip: zip || '',
                comments: comments || '',
              })
            }).then(async r => {
              const d = await r.json().catch(()=>({}));
              if (r.ok) console.log('✅ Update email sent to customer');
              else console.error('❌ Update email error:', d);
            }).catch(e => console.error('❌ Update email failed:', e));
          }

          if (calendarUpdated) {
            alert(`✅ Appointment updated!${sendNotification && smsAvailable ? ' SMS sent.' : ''}${sendUpdateEmail && appointment.email ? ' Update email sent.' : ''}`);
          } else {
            alert(`⚠️ Appointment updated but failed to sync Google Calendar.${sendNotification && smsAvailable ? ' SMS sent.' : ''}${sendUpdateEmail && appointment.email ? ' Update email sent.' : ''}`);
          }

          onSaved();
        } catch (error) {
          console.error('Error updating appointment:', error);
          alert('❌ Error updating appointment');
        } finally {
          setSaving(false);
        }
      };

      return (
